<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photogrammetry Triangulation Viz</title>
    <style>body { margin: 0; overflow: hidden; background-color: #000; }</style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(5, 5, 10);
        controls.update();

        // Target Point (Red Sphere)
        const targetGeometry = new THREE.SphereGeometry(0.2, 32, 32);
        const targetMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const targetPoint = new THREE.Mesh(targetGeometry, targetMaterial);
        scene.add(targetPoint);

        // Cameras and Rays
        const cameraPositions = [
            new THREE.Vector3(-3, 1, 4),
            new THREE.Vector3(3, 1, 4),
            new THREE.Vector3(0, 3, -3)
        ];

        cameraPositions.forEach(pos => {
            // Camera Representation (Blue Sphere)
            const camGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const camMat = new THREE.MeshBasicMaterial({ color: 0x0000ff });
            const camMesh = new THREE.Mesh(camGeo, camMat);
            camMesh.position.copy(pos);
            scene.add(camMesh);

            // Ray (Line)
            const points = [pos, new THREE.Vector3(0, 0, 0)]; // Assuming target is at origin
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0xffffff });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
