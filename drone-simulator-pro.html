<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commercial Drone Physics Simulator (Pro)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eee; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #333; pointer-events: none; }
        #telemetry { font-family: monospace; font-size: 14px; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 5px; }
        #controls { position: absolute; bottom: 20px; left: 20px; color: #333; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>DJI-Inspired Simulator</h1>
        <div id="telemetry">
            Alt: <span id="alt">0.00</span>m<br>
            Vel: <span id="vel">0.00</span>m/s<br>
            Roll: <span id="roll">0.00</span>&deg; | Pitch: <span id="pitch">0.00</span>&deg;
        </div>
    </div>
    <div id="controls">
        W/S: Pitch | A/D: Roll | Q/E: Yaw | Shift/Ctrl: Throttle
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ─── SETUP ───
        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.81, 0) });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);
        
        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);

        // ─── DRONE BUILDER (HIGH FIDELITY) ───
        function buildProDrone() {
            const droneGroup = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.1, metalness: 0.8 });
            
            // Main Chassis
            const mainBody = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.7), mat);
            mainBody.castShadow = true;
            droneGroup.add(mainBody);
            
            // Battery Slot
            const battery = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0x445544}));
            battery.position.set(0, 0, -0.2);
            droneGroup.add(battery);
            
            // Sensors (Front)
            const sensor = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.05), new THREE.MeshStandardMaterial({color: 0x111111}));
            sensor.position.set(0, 0, 0.35);
            droneGroup.add(sensor);

            // Arms & Rotors
            for(let i=0; i<4; i++) {
                const arm = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.05, 0.8), mat);
                const angle = (i * Math.PI / 2) + Math.PI/4;
                arm.position.set(Math.cos(angle)*0.5, 0, Math.sin(angle)*0.5);
                arm.rotation.y = -angle;
                droneGroup.add(arm);
                
                // Motor
                const motor = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.1, 16), new THREE.MeshStandardMaterial({color: 0x888888}));
                motor.position.set(Math.cos(angle)*0.9, 0.05, Math.sin(angle)*0.9);
                droneGroup.add(motor);
            }
            
            return droneGroup;
        }

        const droneMesh = buildProDrone();
        scene.add(droneMesh);
        
        // Physics Body
        const droneBody = new CANNON.Body({ 
            mass: 0.8, 
            shape: new CANNON.Box(new CANNON.Vec3(0.3, 0.1, 0.4)) 
        });
        droneBody.position.set(0, 5, 0);
        world.addBody(droneBody);

        const rotorPositions = [
            new CANNON.Vec3(0.5, 0.05, 0.5),
            new CANNON.Vec3(-0.5, 0.05, 0.5),
            new CANNON.Vec3(0.5, 0.05, -0.5),
            new CANNON.Vec3(-0.5, 0.05, -0.5)
        ];

        // ─── ANIMATION LOOP ───
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();
            
            droneMesh.position.copy(droneBody.position);
            droneMesh.quaternion.copy(droneBody.quaternion);

            // Flight Logic
            const throttle = keys.shift ? 12 : 0; 
            rotorPositions.forEach(pos => {
                droneBody.applyLocalForce(new CANNON.Vec3(0, throttle, 0), pos);
            });

            // Update HUD
            document.getElementById('alt').textContent = droneBody.position.y.toFixed(2);
            document.getElementById('vel').textContent = droneBody.velocity.length().toFixed(2);
            document.getElementById('pitch').textContent = (droneBody.quaternion.toEuler().x * 180 / Math.PI).toFixed(2);
            document.getElementById('roll').textContent = (droneBody.quaternion.toEuler().z * 180 / Math.PI).toFixed(2);
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
