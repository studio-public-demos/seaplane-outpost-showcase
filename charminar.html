<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charminar - Hyderabad, India (1591)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    color: #e8d5b0;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  #info h1 { font-size: 2em; letter-spacing: 0.15em; font-weight: 300; }
  #info p { font-size: 0.85em; opacity: 0.75; margin-top: 4px; }
  #controls {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 0.75em;
    pointer-events: none;
  }
  .loading { color: #e8d5b0; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.2em; }
</style>
</head>
<body>
<div id="info"><h1>CHARMINAR</h1><p>Hyderabad, India &middot; 1591</p></div>
<div id="controls">Drag to rotate &middot; Scroll to zoom &middot; Right-drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───────────────────────────────────────
const scene = new THREE.Scene();

// Sky gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2; canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#4a90d9');
gradient.addColorStop(0.45, '#87ceeb');
gradient.addColorStop(0.8, '#c9e4f7');
gradient.addColorStop(1, '#e8d5b0');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;
scene.fog = new THREE.Fog(0xc9e4f7, 80, 350);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 1, 500);
camera.position.set(70, 45, 90);
camera.lookAt(0, 15, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 18, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 30;
controls.maxDistance = 200;
controls.maxPolarAngle = Math.PI * 0.55;
controls.update();

// ─── Lighting ──────────────────────────────────────────
const ambient = new THREE.AmbientLight('#ffe8c8', 0.7);
scene.add(ambient);

const sun = new THREE.DirectionalLight('#fff8e7', 4.5);
sun.position.set(80, 100, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 400;
sun.shadow.camera.left = -80;
sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80;
sun.shadow.camera.bottom = -10;
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.02;
scene.add(sun);

const fill = new THREE.DirectionalLight('#b0c8ff', 1.0);
fill.position.set(-30, 20, -20);
scene.add(fill);

const rim = new THREE.DirectionalLight('#ffe0c0', 1.2);
rim.position.set(0, 5, -60);
scene.add(rim);

// ─── Materials ─────────────────────────────────────────
const matSandstone = new THREE.MeshStandardMaterial({
  color: '#d4a96a',
  roughness: 0.65,
  metalness: 0.05,
  flatShading: false,
});

const matDome = new THREE.MeshStandardMaterial({
  color: '#f5f0e8',
  roughness: 0.35,
  metalness: 0.1,
});

const matFinial = new THREE.MeshStandardMaterial({
  color: '#c9a040',
  roughness: 0.2,
  metalness: 0.85,
});

const matGround = new THREE.MeshStandardMaterial({
  color: '#8a7a60',
  roughness: 0.9,
  metalness: 0.0,
});

const matAccent = new THREE.MeshStandardMaterial({
  color: '#b8915c',
  roughness: 0.55,
  metalness: 0.08,
});

// ─── Parameters ────────────────────────────────────────
const BW = 60, BH = 4;          // Base plinth
const MW = 52, MH = 30;         // Main building
const GH = 10;                  // Gallery height
const AW = 16, AH = 24, A_D = 14; // Arch dimensions
const MIN_R1 = 3.5, MIN_R2 = 2.0, MIN_H = 42;
const DOME_R = 7, DOME_H = 9;
const SDOME_R = 2.8, SDOME_H = 4;

// ─── Helpers ───────────────────────────────────────────
function mergeGroup(group) {
  // Flatten all meshes in group for shadow casting
  group.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  return group;
}

function pointedArchShape(w, h) {
  const shape = new THREE.Shape();
  const hw = w / 2;
  // Outline: rectangle with pointed top
  shape.moveTo(-hw, 0);
  shape.lineTo(-hw, h * 0.48);
  // Left curve to peak
  shape.quadraticCurveTo(-hw * 0.55, h * 0.75, 0, h);
  // Right curve from peak
  shape.quadraticCurveTo(hw * 0.55, h * 0.75, hw, h * 0.48);
  shape.lineTo(hw, 0);
  shape.closePath();
  return shape;
}

function archFrameShape(w, h, frameW) {
  // Outer rectangle with arch hole
  const outer = new THREE.Shape();
  const ohw = w/2 + frameW;
  const ohh = h + frameW;
  outer.moveTo(-ohw, -frameW);
  outer.lineTo(ohw, -frameW);
  outer.lineTo(ohw, ohh);
  outer.lineTo(-ohw, ohh);
  outer.closePath();
  
  const hole = pointedArchShape(w, h);
  outer.holes.push(hole);
  return outer;
}

function createArchFrame(w, h, frameW, depth) {
  const shape = archFrameShape(w, h, frameW);
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: true, bevelThickness: 0.4, bevelSize: 0.3, bevelSegments: 2 });
  return geo;
}

function onionDome(r, h) {
  const group = new THREE.Group();
  // Bulb - sphere scaled vertically
  const bulbGeo = new THREE.SphereGeometry(r, 48, 32);
  const bulb = new THREE.Mesh(bulbGeo, matDome);
  bulb.scale.set(1, h / r, 1);
  bulb.position.y = 0;
  bulb.castShadow = true;
  bulb.receiveShadow = true;
  group.add(bulb);
  
  // Spire
  const spireGeo = new THREE.CylinderGeometry(0.08, r * 0.3, h * 0.55, 16);
  const spire = new THREE.Mesh(spireGeo, matFinial);
  spire.position.y = h * 0.65;
  spire.castShadow = true;
  group.add(spire);
  
  // Small ball on top
  const ballGeo = new THREE.SphereGeometry(0.25, 8, 8);
  const ball = new THREE.Mesh(ballGeo, matFinial);
  ball.position.y = h * 0.85;
  ball.castShadow = true;
  group.add(ball);
  
  return group;
}

// ─── Build Charminar ───────────────────────────────────
const charminar = new THREE.Group();

// ═══ Ground ════════════════════════════════════════════
const groundGeo = new THREE.PlaneGeometry(200, 200);
const ground = new THREE.Mesh(groundGeo, matGround);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -MH/2 - BH - 0.1;
ground.receiveShadow = true;
scene.add(ground);

// ═══ Base Plinth ═══════════════════════════════════════
const plinthGroup = new THREE.Group();

const plinthGeo = new THREE.BoxGeometry(BW + 4, BH, BW + 4);
const plinth = new THREE.Mesh(plinthGeo, matSandstone);
plinth.position.y = -MH/2 - BH/2;
plinth.castShadow = true;
plinth.receiveShadow = true;
plinthGroup.add(plinth);

// Steps on 4 sides
for (let a = 0; a < 4; a++) {
  const angle = a * Math.PI / 2;
  for (let s = 0; s < 5; s++) {
    const stepGeo = new THREE.BoxGeometry(BW + 2, 1, 1.4);
    const step = new THREE.Mesh(stepGeo, matAccent);
    step.position.set(
      Math.sin(angle) * (BW/2 + 1 + s * 1.4),
      -MH/2 - BH + s * 1,
      Math.cos(angle) * (BW/2 + 1 + s * 1.4)
    );
    step.rotation.y = angle;
    step.castShadow = true;
    step.receiveShadow = true;
    plinthGroup.add(step);
  }
}
charminar.add(plinthGroup);

// ═══ Main Building ═════════════════════════════════════
const buildingGroup = new THREE.Group();

const mainGeo = new THREE.BoxGeometry(MW, MH, MW);
const mainBlock = new THREE.Mesh(mainGeo, matSandstone);
mainBlock.castShadow = true;
mainBlock.receiveShadow = true;
buildingGroup.add(mainBlock);

// Grand arch frames on 4 faces
const archGeo = createArchFrame(AW, AH, 4, A_D);
for (let a = 0; a < 4; a++) {
  const angle = a * Math.PI / 2;
  const frame = new THREE.Mesh(archGeo, matAccent);
  frame.position.set(0, MH/2 - AH - 2, MW/2);
  frame.rotation.x = -Math.PI / 2;
  frame.rotation.y = angle;
  frame.castShadow = true;
  frame.receiveShadow = true;
  buildingGroup.add(frame);
}

// Upper gallery arch frames
const smallArchGeo = createArchFrame(AW * 0.55, GH * 0.85, 2.5, A_D * 0.6);
for (let a = 0; a < 4; a++) {
  const angle = a * Math.PI / 2;
  const frame = new THREE.Mesh(smallArchGeo, matAccent);
  frame.position.set(0, MH/2 - GH + 1, MW/2);
  frame.rotation.x = -Math.PI / 2;
  frame.rotation.y = angle;
  frame.castShadow = true;
  frame.receiveShadow = true;
  buildingGroup.add(frame);
}

// Side windows
const winGeo = createArchFrame(AW * 0.28, GH * 0.6, 1.5, A_D * 0.35);
for (let a = 0; a < 4; a++) {
  const angle = a * Math.PI / 2;
  for (let x = -1; x <= 1; x += 2) {
    const frame = new THREE.Mesh(winGeo, matAccent);
    frame.position.set(x * MW * 0.27, MH/2 - GH + 1, MW/2);
    frame.rotation.x = -Math.PI / 2;
    frame.rotation.y = angle;
    frame.castShadow = true;
    frame.receiveShadow = true;
    buildingGroup.add(frame);
  }
}

// String courses (horizontal bands)
for (const z of [MH/2 - GH, -MH/2 + 2, MH/2 - GH - 4]) {
  const bandGeo = new THREE.BoxGeometry(MW + 1.5, 0.6, MW + 1.5);
  const band = new THREE.Mesh(bandGeo, matAccent);
  band.position.y = z;
  band.castShadow = true;
  band.receiveShadow = true;
  buildingGroup.add(band);
}

// Parapet
const parapetGroup = new THREE.Group();
const paraOuter = new THREE.BoxGeometry(MW + 1, 2.5, MW + 1);
const paraOuterMesh = new THREE.Mesh(paraOuter, matSandstone);
paraOuterMesh.position.y = MH/2;
paraOuterMesh.castShadow = true;
paraOuterMesh.receiveShadow = true;
parapetGroup.add(paraOuterMesh);

// Crenellations
for (let a = 0; a < 4; a++) {
  const angle = a * Math.PI / 2;
  for (let ix = -MW/2 + 3; ix < MW/2 - 3; ix += 5) {
    const battGeo = new THREE.BoxGeometry(2.2, 2.5, 1);
    const batt = new THREE.Mesh(battGeo, matAccent);
    batt.position.set(
      ix,
      MH/2 + 1.8,
      MW/2 + 0.2
    );
    batt.rotation.y = angle;
    batt.castShadow = true;
    batt.receiveShadow = true;
    parapetGroup.add(batt);
  }
}
buildingGroup.add(parapetGroup);

charminar.add(buildingGroup);

// ═══ Minarets (4) ══════════════════════════════════════
const minaretsGroup = new THREE.Group();
for (let a = 0; a < 4; a++) {
  const angle = a * Math.PI / 2 + Math.PI / 4;
  const cx = (MW/2 - MIN_R1 - 2.5) * Math.cos(angle);
  const cz = (MW/2 - MIN_R1 - 2.5) * Math.sin(angle);
  const baseY = MH/2;
  
  const minGroup = new THREE.Group();
  
  // Tapered shaft
  const shaftGeo = new THREE.CylinderGeometry(MIN_R2, MIN_R1, MIN_H, 32);
  const shaft = new THREE.Mesh(shaftGeo, matSandstone);
  shaft.position.y = baseY + MIN_H/2;
  shaft.castShadow = true;
  shaft.receiveShadow = true;
  minGroup.add(shaft);
  
  // Balcony rings
  for (let i = 1; i <= 3; i++) {
    const z = baseY + (MIN_H / 4) * i;
    const r = MIN_R1 - (MIN_R1 - MIN_R2) * ((z - baseY) / MIN_H);
    
    // Ring platform
    const ringGeo = new THREE.TorusGeometry(r + 1.5, 0.6, 8, 24);
    const ring = new THREE.Mesh(ringGeo, matDome);
    ring.position.y = z;
    ring.rotation.x = Math.PI / 2;
    ring.castShadow = true;
    ring.receiveShadow = true;
    minGroup.add(ring);
    
    // Brackets
    for (let j = 0; j < 8; j++) {
      const bAngle = j * Math.PI / 4;
      const bx = Math.cos(bAngle) * (r + 1.8);
      const bz = Math.sin(bAngle) * (r + 1.8);
      const bracketGeo = new THREE.BoxGeometry(1.0, 0.4, 0.5);
      const bracket = new THREE.Mesh(bracketGeo, matAccent);
      bracket.position.set(bx, z, bz);
      bracket.rotation.y = bAngle;
      bracket.castShadow = true;
      minGroup.add(bracket);
    }
  }
  
  // Top dome
  const topDome = onionDome(SDOME_R, SDOME_H);
  topDome.position.y = baseY + MIN_H;
  minGroup.add(topDome);
  
  minGroup.position.set(cx, 0, cz);
  minaretsGroup.add(minGroup);
}
charminar.add(minaretsGroup);

// ═══ Central Dome ══════════════════════════════════════
const centralDome = onionDome(DOME_R, DOME_H);
centralDome.position.y = MH/2 + 2.5;
charminar.add(centralDome);

// ═══ Chhatris (corner pavilions) ═══════════════════════
for (let a = 0; a < 4; a++) {
  const angle = a * Math.PI / 2 + Math.PI / 4;
  const cx = (MW/2 - 8) * Math.cos(angle);
  const cz = (MW/2 - 8) * Math.sin(angle);
  
  const chGroup = new THREE.Group();
  const baseY = MH/2 + 2.5;
  
  // Pillars
  for (let j = 0; j < 6; j++) {
    const pAngle = j * Math.PI / 3;
    const px = Math.cos(pAngle) * 1.6;
    const pz = Math.sin(pAngle) * 1.6;
    const pillarGeo = new THREE.CylinderGeometry(0.35, 0.4, 2.5, 12);
    const pillar = new THREE.Mesh(pillarGeo, matDome);
    pillar.position.set(px, baseY + 1.25, pz);
    pillar.castShadow = true;
    pillar.receiveShadow = true;
    chGroup.add(pillar);
  }
  
  // Small dome
  const chDome = onionDome(2.5, 3.2);
  chDome.position.y = baseY + 2.5;
  chGroup.add(chDome);
  
  chGroup.position.set(cx, 0, cz);
  charminar.add(chGroup);
}

// ═══ Add to scene ══════════════════════════════════════
scene.add(charminar);

// Position charminar so it sits on ground
charminar.position.y = 0;

// ─── Render Loop ───────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ─── Resize Handler ────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.querySelector('.loading')?.remove();
console.log('🏛️ Charminar loaded — Hyderabad, 1591');
</script>
</body>
</html>
