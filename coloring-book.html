<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Coloring Book</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family:'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(135deg,#fce4ec 0%,#e8f5e9 30%,#e3f2fd 60%,#fff8e1 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}

header{text-align:center;padding:10px 16px 4px;width:100%}
header h1{
  font-size:clamp(22px,5vw,34px);
  background:linear-gradient(90deg,#ff6f61,#ffb74d,#7e57c2,#4fc3f7,#81c784);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-weight:800;letter-spacing:2px;
}

.page-nav{display:flex;align-items:center;gap:10px;padding:2px 0 6px;flex-wrap:wrap;justify-content:center}
.page-nav button{
  width:44px;height:44px;border-radius:50%;border:3px solid #e0e0e0;background:white;
  font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.1);transition:all .15s;
}
.page-nav button:hover{transform:scale(1.1)}
.page-nav button:active{transform:scale(.92)}
.page-name{font-size:16px;font-weight:700;color:#555;min-width:90px;text-align:center}
.page-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:2px 8px;max-width:700px;margin:0 auto}
.page-dot{width:12px;height:12px;border-radius:50%;border:2px solid #ccc;background:#fff;cursor:pointer;transition:all .15s}
.page-dot:hover{transform:scale(1.3);border-color:#888}
.page-dot.active{background:#7e57c2;border-color:#7e57c2;transform:scale(1.2)}

.toolbar{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:4px 12px;max-width:800px;width:100%}
.tool-group{display:flex;gap:4px;background:rgba(255,255,255,.7);border-radius:20px;padding:4px 6px;backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.08)}

.tool-btn{
  width:44px;height:44px;border-radius:50%;border:3px solid transparent;background:white;
  cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.1);
}
.tool-btn:hover{transform:scale(1.1)}
.tool-btn:active{transform:scale(.92)}
.tool-btn.active{border-color:#ff6f61;background:#fff5f5;transform:scale(1.08)}

.color-btn{
  width:36px;height:36px;border-radius:50%;border:3px solid #e0e0e0;cursor:pointer;
  transition:all .15s;box-shadow:0 2px 4px rgba(0,0,0,.12);
}
.color-btn:hover{transform:scale(1.2)}
.color-btn:active{transform:scale(.9)}
.color-btn.selected{border-color:#333;transform:scale(1.15);box-shadow:0 0 0 4px rgba(255,111,97,.3)}

.canvas-container{
  position:relative;margin:6px auto;border-radius:16px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.12),0 0 0 6px #fff,0 0 0 10px #e0e0e0;
  background:white;max-width:calc(100vw - 24px);cursor:crosshair;touch-action:none;
}
canvas{display:block;background:white}

.action-bar{display:flex;gap:8px;padding:6px 12px 12px;flex-wrap:wrap;justify-content:center}
.action-btn{
  padding:8px 16px;border-radius:24px;border:2px solid #e0e0e0;background:white;
  cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;
  box-shadow:0 2px 6px rgba(0,0,0,.08);display:flex;align-items:center;gap:4px;
}
.action-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.action-btn:active{transform:scale(.95)}
.action-btn.fill-active{background:#4fc3f7;color:white;border-color:#4fc3f7}

.sparkle{position:fixed;pointer-events:none;animation:sparkleAnim .6s ease-out forwards;z-index:1000;font-size:24px}
@keyframes sparkleAnim{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(.3)}
}

@media(max-width:600px){
  .toolbar{gap:4px;padding:4px 4px}
  .tool-btn{width:38px;height:38px;font-size:17px}
  .color-btn{width:30px;height:30px}
  .action-btn{font-size:12px;padding:6px 12px}
  .canvas-container{margin:2px auto}
  .page-nav button{width:38px;height:38px;font-size:18px}
}
</style>
</head>
<body>

<header><h1>My Coloring Book</h1></header>

<div class="page-nav">
  <button id="btn-prev" aria-label="Previous page">&#9664;</button>
  <span class="page-name" id="page-name">Butterfly</span>
  <button id="btn-next" aria-label="Next page">&#9654;</button>
</div>
<div class="page-dots" id="page-dots"></div>

<div class="toolbar">
  <div class="tool-group">
    <button class="tool-btn active" id="btn-fill" title="Paint Bucket" aria-label="Fill">&#129530;</button>
    <button class="tool-btn" id="btn-brush" title="Brush" aria-label="Brush">&#9998;&#65039;</button>
  </div>
  <div class="tool-group" id="color-palette">
    <button class="color-btn selected" style="background:#e53935" data-color="#e53935"></button>
    <button class="color-btn" style="background:#fb8c00" data-color="#fb8c00"></button>
    <button class="color-btn" style="background:#fdd835" data-color="#fdd835"></button>
    <button class="color-btn" style="background:#43a047" data-color="#43a047"></button>
    <button class="color-btn" style="background:#1e88e5" data-color="#1e88e5"></button>
    <button class="color-btn" style="background:#8e24aa" data-color="#8e24aa"></button>
    <button class="color-btn" style="background:#ec407a" data-color="#ec407a"></button>
    <button class="color-btn" style="background:#333333" data-color="#333333"></button>
    <button class="color-btn" style="background:#795548" data-color="#795548"></button>
  </div>
</div>

<div class="canvas-container">
  <canvas id="coloring-canvas"></canvas>
</div>

<div class="action-bar">
  <button class="action-btn" id="btn-undo">&#8617; Undo</button>
  <button class="action-btn" id="btn-reset" style="color:#e53935">&#128260; Re-outline</button>
  <button class="action-btn" id="btn-clear" style="color:#f57c00">&#128465; Clear Colors</button>
  <button class="action-btn" id="btn-save" style="color:#43a047">&#128190; Save</button>
</div>

<footer style="text-align:center;padding:10px;margin-top:auto;opacity:.5;font-size:11px;font-family:system-ui;color:#666">
  <a href="https://nebulacloud.studio" style="color:#3b82f6;text-decoration:none">Built with NebulaCloud Studio</a>
</footer>

<script>
(function(){
const canvas=document.getElementById('coloring-canvas');
const ctx=canvas.getContext('2d');

let DISPLAY_W, DISPLAY_H, DPR;
function resizeCanvas(){
  const maxW=Math.min(window.innerWidth-24,800);
  const maxH=Math.min(window.innerHeight-340,600);
  DISPLAY_W=Math.max(maxW,280);
  DISPLAY_H=Math.max(maxH,300);
  DPR=window.devicePixelRatio||1;
  canvas.style.width=DISPLAY_W+'px';
  canvas.style.height=DISPLAY_H+'px';
  canvas.width=DISPLAY_W*DPR;
  canvas.height=DISPLAY_H*DPR;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(DPR,DPR);
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.imageSmoothingEnabled=false;
}
resizeCanvas();

let currentTool='fill';
let currentColor='#e53935';
let drawing=false,lastX=0,lastY=0;
const undoStack=[];
const MAX_UNDO=30;

function pushUndo(){
  undoStack.push(ctx.getImageData(0,0,canvas.width,canvas.height));
  if(undoStack.length>MAX_UNDO)undoStack.shift();
}

function undo(){
  if(undoStack.length===0)return;
  const img=undoStack.pop();
  ctx.putImageData(img,0,0);
  sparkle(canvas.getBoundingClientRect().left+40,canvas.getBoundingClientRect().top+40);
}

function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16);
  const g=parseInt(h.slice(3,5),16);
  const b=parseInt(h.slice(5,7),16);
  return[r,g,b];
}

function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function colorMatch(a,b,tolerance=32){
  return Math.abs(a[0]-b[0])<tolerance&&Math.abs(a[1]-b[1])<tolerance&&Math.abs(a[2]-b[2])<tolerance;
}

function isOutline(r,g,b){
  return r<50&&g<50&&b<50;
}

// Flood fill using scanline algorithm
function floodFill(startX,startY,fillColorHex){
  const [fr,fg,fb]=hexToRgb(fillColorHex);
  const w=canvas.width,h=canvas.height;
  const imgData=ctx.getImageData(0,0,w,h);
  const data=imgData.data;

  const sx=Math.round(startX*DPR);
  const sy=Math.round(startY*DPR);
  if(sx<0||sx>=w||sy<0||sy>=h)return;

  const idx=(sy*w+sx)*4;
  const targetR=data[idx],targetG=data[idx+1],targetB=data[idx+2];
  const targetA=data[idx+3];

  // Don't fill outlines
  if(isOutline(targetR,targetG,targetB))return;
  // Don't fill if clicking on already-filled area of the same color
  if(colorMatch([targetR,targetG,targetB],[fr,fg,fb],10))return;

  const stack=[[sx,sy]];
  const visited=new Uint8Array(w*h);

  while(stack.length>0){
    const [x,y]=stack.pop();
    let left=x;
    while(left>=0){
      const i=(y*w+left)*4;
      if(!colorMatch([data[i],data[i+1],data[i+2]],[targetR,targetG,targetB],32)||isOutline(data[i],data[i+1],data[i+2]))break;
      left--;
    }
    left++;

    let right=x;
    while(right<w){
      const i=(y*w+right)*4;
      if(!colorMatch([data[i],data[i+1],data[i+2]],[targetR,targetG,targetB],32)||isOutline(data[i],data[i+1],data[i+2]))break;
      right++;
    }
    right--;

    // Fill the span
    for(let xx=left;xx<=right;xx++){
      const i=(y*w+xx)*4;
      data[i]=fr;data[i+1]=fg;data[i+2]=fb;data[i+3]=255;
    }

    // Check row above
    if(y>0){
      for(let xx=left;xx<=right;xx++){
        const i=((y-1)*w+xx)*4;
        if(!isOutline(data[i],data[i+1],data[i+2])&&colorMatch([data[i],data[i+1],data[i+2]],[targetR,targetG,targetB],32)&&!visited[(y-1)*w+xx]){
          visited[(y-1)*w+xx]=1;
          stack.push([xx,y-1]);
        }
      }
    }
    // Check row below
    if(y<h-1){
      for(let xx=left;xx<=right;xx++){
        const i=((y+1)*w+xx)*4;
        if(!isOutline(data[i],data[i+1],data[i+2])&&colorMatch([data[i],data[i+1],data[i+2]],[targetR,targetG,targetB],32)&&!visited[(y+1)*w+xx]){
          visited[(y+1)*w+xx]=1;
          stack.push([xx,y+1]);
        }
      }
    }
  }

  ctx.putImageData(imgData,0,0);
}

function playBeep(f,d,t){
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator();
    const g=ac.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.value=.06;g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
    o.connect(g);g.connect(ac.destination);
    o.start(ac.currentTime);o.stop(ac.currentTime+d);
  }catch(e){}
}

function sparkle(x,y){
  const emojis=['&#10024;','&#11088;','&#127775;','&#128165;'];
  for(let i=0;i<5;i++){
    const s=document.createElement('span');
    s.className='sparkle';
    s.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=(x+(Math.random()-.5)*80)+'px';
    s.style.top=(y+(Math.random()-.5)*60)+'px';
    s.style.animationDuration=(.4+Math.random()*.6)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

// ---- Outline Drawing Pages ----
const OUTLINE_COLOR='#2d2d2d';
const OUTLINE_WIDTH=3;

function drawPage(idx){
  ctx.clearRect(0,0,DISPLAY_W,DISPLAY_H);
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,DISPLAY_W,DISPLAY_H);
  ctx.strokeStyle=OUTLINE_COLOR;
  ctx.lineWidth=OUTLINE_WIDTH;
  ctx.fillStyle=OUTLINE_COLOR;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  const midX=DISPLAY_W/2, midY=DISPLAY_H/2;
  const s=Math.min(DISPLAY_W,DISPLAY_H);

  switch(idx){
    case 0: drawButterfly(midX,midY,s); break;
    case 1: drawHouse(midX,midY,s); break;
    case 2: drawCat(midX,midY,s); break;
    case 3: drawFlower(midX,midY,s); break;
    case 4: drawFish(midX,midY,s); break;
    case 5: drawDino(midX,midY,s); break;
    case 6: drawIceCream(midX,midY,s); break;
    case 7: drawCar(midX,midY,s); break;
    case 8: drawRocket(midX,midY,s); break;
    case 9: drawUnicorn(midX,midY,s); break;
    case 10: drawTree(midX,midY,s); break;
    case 11: drawOwl(midX,midY,s); break;
    case 12: drawCastle(midX,midY,s); break;
  }

  undoStack.length=0;
  pushUndo();
}

function drawButterfly(cx,cy,s){
  const r=s*.35;
  // Body
  ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(cx,cy-4,r*.1,r*.3,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy+20,r*.12,r*.35,0,0,Math.PI*2);ctx.stroke();
  // Antennae
  ctx.beginPath();ctx.moveTo(cx-8,cy-r*.25);ctx.quadraticCurveTo(cx-20,cy-r*.5,cx-25,cy-r*.55);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+8,cy-r*.25);ctx.quadraticCurveTo(cx+20,cy-r*.5,cx+25,cy-r*.55);ctx.stroke();
  ctx.beginPath();ctx.arc(cx-25,cy-r*.55,r*.03,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+25,cy-r*.55,r*.03,0,Math.PI*2);ctx.stroke();
  // Upper wings
  ctx.beginPath();ctx.moveTo(cx-8,cy-r*.1);ctx.quadraticCurveTo(cx-r*.7,cy-r*.6,cx-r*.65,cy+r*.05);ctx.quadraticCurveTo(cx-r*.3,cy-r*.1,cx-5,cy-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+8,cy-r*.1);ctx.quadraticCurveTo(cx+r*.7,cy-r*.6,cx+r*.65,cy+r*.05);ctx.quadraticCurveTo(cx+r*.3,cy-r*.1,cx+5,cy-2);ctx.stroke();
  // Lower wings
  ctx.beginPath();ctx.moveTo(cx-5,cy+2);ctx.quadraticCurveTo(cx-r*.5,cy+r*.15,cx-r*.45,cy+r*.45);ctx.quadraticCurveTo(cx-r*.15,cy+r*.15,cx-2,cy+r*.15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+5,cy+2);ctx.quadraticCurveTo(cx+r*.5,cy+r*.15,cx+r*.45,cy+r*.45);ctx.quadraticCurveTo(cx+r*.15,cy+r*.15,cx+2,cy+r*.15);ctx.stroke();
  // Wing patterns
  ctx.beginPath();ctx.arc(cx-r*.25,cy-r*.15,r*.1,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+r*.25,cy-r*.15,r*.1,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx-r*.2,cy+r*.2,r*.07,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+r*.2,cy+r*.2,r*.07,0,Math.PI*2);ctx.stroke();
}

function drawHouse(cx,cy,s){
  // Walls
  ctx.strokeRect(cx-s*.25,cy-s*.05,s*.5,s*.35);
  // Roof
  ctx.beginPath();ctx.moveTo(cx-s*.3,cy-s*.05);ctx.lineTo(cx,cy-s*.35);ctx.lineTo(cx+s*.3,cy-s*.05);ctx.closePath();ctx.stroke();
  // Door
  ctx.strokeRect(cx-s*.06,cy+s*.05,s*.12,s*.25);
  ctx.beginPath();ctx.arc(cx+s*.03,cy+s*.17,r*.015,0,Math.PI*2);ctx.stroke();
  // Windows
  ctx.strokeRect(cx-s*.18,cy-s*.02,s*.09,s*.09);
  ctx.beginPath();ctx.moveTo(cx-s*.18,cy+.025);ctx.lineTo(cx-s*.09,cy+.025);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-s*.135,cy-.02);ctx.lineTo(cx-s*.135,cy+.07);ctx.stroke();
  ctx.strokeRect(cx+s*.09,cy-s*.02,s*.09,s*.09);
  ctx.beginPath();ctx.moveTo(cx+s*.09,cy+.025);ctx.lineTo(cx+s*.18,cy+.025);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+s*.135,cy-.02);ctx.lineTo(cx+s*.135,cy+.07);ctx.stroke();
  // Chimney
  ctx.strokeRect(cx+s*.1,cy-s*.28,s*.06,s*.15);
  // Sun
  ctx.beginPath();ctx.arc(cx+s*.38,cy-s*.3,r*.08,0,Math.PI*2);ctx.stroke();
  // Grass
  ctx.beginPath();ctx.moveTo(cx-s*.35,cy+s*.3);ctx.lineTo(cx+s*.35,cy+s*.3);ctx.stroke();
  for(let i=-5;i<=5;i++){ctx.beginPath();ctx.moveTo(cx+i*s*.06,cy+s*.3);ctx.lineTo(cx+(i-.5)*s*.06,cy+s*.22);ctx.stroke();}
}

function drawCat(cx,cy,s){
  // Head
  ctx.beginPath();ctx.arc(cx,cy-s*.05,r*.15,0,Math.PI*2);ctx.stroke();
  // Ears
  ctx.beginPath();ctx.moveTo(cx-r*.1,cy-s*.15);ctx.lineTo(cx-r*.16,cy-s*.28);ctx.lineTo(cx-r*.02,cy-s*.17);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*.1,cy-s*.15);ctx.lineTo(cx+r*.16,cy-s*.28);ctx.lineTo(cx+r*.02,cy-s*.17);ctx.stroke();
  // Inner ears
  ctx.beginPath();ctx.moveTo(cx-r*.1,cy-s*.16);ctx.lineTo(cx-r*.13,cy-s*.24);ctx.lineTo(cx-r*.05,cy-s*.17);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*.1,cy-s*.16);ctx.lineTo(cx+r*.13,cy-s*.24);ctx.lineTo(cx+r*.05,cy-s*.17);ctx.stroke();
  // Eyes
  ctx.beginPath();ctx.ellipse(cx-r*.06,cy-s*.07,r*.025,r*.04,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx+r*.06,cy-s*.07,r*.025,r*.04,0,0,Math.PI*2);ctx.stroke();
  // Pupils
  ctx.beginPath();ctx.arc(cx-r*.06,cy-s*.06,r*.01,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.06,cy-s*.06,r*.01,0,Math.PI*2);ctx.fill();
  // Nose
  ctx.beginPath();ctx.moveTo(cx,cy-s*.01);ctx.lineTo(cx-r*.015,cy+.01);ctx.lineTo(cx+r*.015,cy+.01);ctx.closePath();ctx.stroke();
  // Mouth
  ctx.beginPath();ctx.moveTo(cx,cy+.01);ctx.quadraticCurveTo(cx-r*.03,cy+.05,cx-r*.05,cy+.03);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+.01);ctx.quadraticCurveTo(cx+r*.03,cy+.05,cx+r*.05,cy+.03);ctx.stroke();
  // Whiskers
  for(let side of[-1,1]){
    ctx.beginPath();ctx.moveTo(cx+side*r*.05,cy+.01);ctx.lineTo(cx+side*r*.2,cy-0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+side*r*.05,cy+.02);ctx.lineTo(cx+side*r*.2,cy+.03);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+side*r*.05,cy+.03);ctx.lineTo(cx+side*r*.18,cy+.06);ctx.stroke();
  }
  // Body
  ctx.beginPath();ctx.moveTo(cx-r*.1,cy+r*.08);ctx.lineTo(cx-r*.14,cy+r*.3);ctx.lineTo(cx+r*.14,cy+r*.3);ctx.lineTo(cx+r*.1,cy+r*.08);ctx.stroke();
  // Legs
  ctx.strokeRect(cx-r*.1,cy+r*.28,s*.08,s*.08);
  ctx.strokeRect(cx+r*.02,cy+r*.28,s*.08,s*.08);
  // Tail
  ctx.beginPath();ctx.moveTo(cx+r*.14,cy+r*.25);ctx.quadraticCurveTo(cx+r*.3,cy+r*.15,cx+r*.28,cy+r*.05);ctx.stroke();
}

function drawFlower(cx,cy,s){
  // Petals
  const pr=s*.08;
  for(let i=0;i<6;i++){
    const angle=(i/6)*Math.PI*2-Math.PI/2;
    const px=cx+Math.cos(angle)*pr*1.1;
    const py=cy+Math.sin(angle)*pr*1.1;
    ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.stroke();
  }
  // Center
  ctx.beginPath();ctx.arc(cx,cy,pr*.6,0,Math.PI*2);ctx.stroke();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*pr*.25,cy+Math.sin(a)*pr*.25,pr*.08,0,Math.PI*2);ctx.stroke();
  }
  // Stem
  ctx.beginPath();ctx.moveTo(cx,cy+pr);ctx.lineTo(cx,cy+s*.35);ctx.stroke();
  // Leaves
  ctx.beginPath();ctx.moveTo(cx,cy+s*.15);ctx.quadraticCurveTo(cx-r*.12,cy+s*.17,cx-r*.08,cy+s*.28);ctx.quadraticCurveTo(cx,cy+s*.2,cx,cy+s*.15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy+s*.2);ctx.quadraticCurveTo(cx+r*.12,cy+s*.22,cx+r*.08,cy+s*.32);ctx.quadraticCurveTo(cx,cy+s*.25,cx,cy+s*.2);ctx.stroke();
  // Ground
  ctx.beginPath();ctx.moveTo(cx-s*.2,cy+s*.35);ctx.lineTo(cx+s*.2,cy+s*.35);ctx.stroke();
}

function drawFish(cx,cy,s){
  // Body
  ctx.beginPath();ctx.ellipse(cx,cy,s*.25,s*.13,0,0,Math.PI*2);ctx.stroke();
  // Tail
  ctx.beginPath();ctx.moveTo(cx-s*.25,cy);ctx.lineTo(cx-s*.38,cy-s*.15);ctx.lineTo(cx-s*.38,cy+s*.15);ctx.closePath();ctx.stroke();
  // Tail lines
  ctx.beginPath();ctx.moveTo(cx-s*.27,cy);ctx.lineTo(cx-s*.35,cy-s*.06);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-s*.27,cy);ctx.lineTo(cx-s*.35,cy+.06);ctx.stroke();
  // Eye
  ctx.beginPath();ctx.arc(cx+s*.16,cy-s*.02,r*.04,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+s*.17,cy-s*.02,r*.015,0,Math.PI*2);ctx.fill();
  // Mouth
  ctx.beginPath();ctx.arc(cx+s*.24,cy+.02,r*.02,0,Math.PI);ctx.stroke();
  // Fins
  ctx.beginPath();ctx.moveTo(cx-s*.05,cy-s*.1);ctx.quadraticCurveTo(cx-s*.02,cy-s*.2,cx+s*.05,cy-s*.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-s*.05,cy+s*.1);ctx.quadraticCurveTo(cx-s*.02,cy+s*.2,cx+s*.05,cy+s*.1);ctx.stroke();
  // Scales
  for(let i=-1;i<=1;i++){
    for(let j=-3;j<=3;j++){
      const sx=cx+i*s*.1, sy=cy+j*s*.045;
      if(sx>cx-s*.18&&sx<cx+s*.15){
        ctx.beginPath();ctx.arc(sx,sy,r*.018,0,Math.PI,false);ctx.stroke();
      }
    }
  }
  // Bubbles
  ctx.beginPath();ctx.arc(cx+s*.32,cy-s*.12,r*.03,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+s*.36,cy-s*.18,r*.02,0,Math.PI*2);ctx.stroke();
}

function drawDino(cx,cy,s){
  // Body
  ctx.beginPath();ctx.ellipse(cx,cy+s*.02,s*.18,s*.12,0,0,Math.PI*2);ctx.stroke();
  // Head
  ctx.beginPath();ctx.arc(cx+s*.15,cy-s*.08,r*.09,0,Math.PI*2);ctx.stroke();
  // Neck
  ctx.beginPath();ctx.moveTo(cx+s*.06,cy-s*.04);ctx.lineTo(cx+s*.1,cy-s*.15);ctx.stroke();
  // Eye
  ctx.beginPath();ctx.arc(cx+s*.18,cy-s*.1,r*.02,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+s*.185,cy-s*.1,r*.008,0,Math.PI*2);ctx.fill();
  // Mouth
  ctx.beginPath();ctx.moveTo(cx+s*.22,cy-s*.04);ctx.lineTo(cx+s*.24,cy-.02);ctx.lineTo(cx+s*.2,cy-.01);ctx.stroke();
  // Spikes
  for(let i=0;i<5;i++){
    const t=i/4;
    const dx=cx+(-s*.15+t*s*.3);
    const dy=cy-s*.1-Math.sin(t*Math.PI)*s*.06;
    ctx.beginPath();ctx.moveTo(dx-s*.02,cy-s*.1-Math.sin(t*Math.PI)*s*.05);
    ctx.lineTo(dx,dy);ctx.lineTo(dx+s*.02,cy-s*.1-Math.sin(t*Math.PI)*s*.05);
    ctx.stroke();
  }
  // Legs
  ctx.strokeRect(cx-s*.08,cy+s*.1,s*.06,s*.12);
  ctx.strokeRect(cx+s*.04,cy+s*.1,s*.06,s*.12);
  // Tail
  ctx.beginPath();ctx.moveTo(cx-s*.18,cy);ctx.quadraticCurveTo(cx-s*.3,cy-s*.05,cx-s*.32,cy+.05);ctx.stroke();
  // Ground
  ctx.beginPath();ctx.moveTo(cx-s*.35,cy+s*.22);ctx.lineTo(cx+s*.35,cy+s*.22);ctx.stroke();
}

function drawIceCream(cx,cy,s){
  // Scoops
  ctx.beginPath();ctx.arc(cx,cy-s*.08,s*.1,Math.PI,0);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy-s*.14,s*.12,Math.PI,0);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy-s*.2,s*.13,Math.PI,.2);ctx.stroke();
  // Topping dots
  for(let i=0;i<5;i++){
    const a=Math.random()*Math.PI*2;
    const d=Math.random()*s*.08;
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy-s*.13+Math.sin(a)*d*.5,r*.012,0,Math.PI*2);ctx.stroke();
  }
  // Cone
  ctx.beginPath();ctx.moveTo(cx-s*.06,cy-.0);ctx.lineTo(cx,cy+s*.25);ctx.lineTo(cx+s*.06,cy-0);ctx.stroke();
  // Cone lines
  ctx.beginPath();ctx.moveTo(cx-s*.045,cy+.04);ctx.lineTo(cx+s*.035,cy+.04);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-s*.035,cy+.08);ctx.lineTo(cx+s*.025,cy+.08);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-s*.02,cy+.12);ctx.lineTo(cx+s*.015,cy+.12);ctx.stroke();
  // Cherry
  ctx.beginPath();ctx.arc(cx,cy-s*.28,r*.03,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-s*.31);ctx.quadraticCurveTo(cx+s*.02,cy-s*.34,cx+s*.03,cy-s*.33);ctx.stroke();
}

function drawCar(cx,cy,s){
  // Body
  ctx.beginPath();ctx.moveTo(cx-s*.15,cy);ctx.lineTo(cx-s*.18,cy);ctx.lineTo(cx-s*.18,cy-s*.08);
  ctx.lineTo(cx-s*.15,cy-s*.08);ctx.lineTo(cx-s*.1,cy-s*.16);ctx.lineTo(cx+s*.05,cy-s*.16);
  ctx.lineTo(cx+s*.15,cy-s*.08);ctx.lineTo(cx+s*.18,cy-s*.08);ctx.lineTo(cx+s*.18,cy);
  ctx.lineTo(cx+s*.15,cy);ctx.closePath();ctx.stroke();
  // Windows
  ctx.beginPath();ctx.moveTo(cx-s*.08,cy-s*.15);ctx.lineTo(cx-s*.12,cy-s*.09);ctx.lineTo(cx-s*.03,cy-s*.09);ctx.lineTo(cx,cy-s*.15);ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+.01,cy-s*.15);ctx.lineTo(cx+.04,cy-s*.09);ctx.lineTo(cx+.13,cy-s*.09);ctx.lineTo(cx+.14,cy-s*.15);ctx.closePath();ctx.stroke();
  // Wheels
  ctx.beginPath();ctx.arc(cx-s*.1,cy+.02,r*.06,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx-s*.1,cy+.02,r*.02,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+s*.1,cy+.02,r*.06,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+s*.1,cy+.02,r*.02,0,Math.PI*2);ctx.stroke();
  // Headlights
  ctx.beginPath();ctx.arc(cx+s*.17,cy-r*.03,r*.02,0,Math.PI*2);ctx.stroke();
  // Bumper
  ctx.beginPath();ctx.moveTo(cx-s*.18,cy);ctx.lineTo(cx-s*.2,cy-.02);ctx.lineTo(cx-s*.18,cy-.04);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+s*.18,cy);ctx.lineTo(cx+s*.2,cy-.02);ctx.lineTo(cx+s*.18,cy-.04);ctx.stroke();
  // Road
  ctx.beginPath();ctx.moveTo(cx-s*.35,cy+.08);ctx.lineTo(cx+s*.35,cy+.08);ctx.stroke();
}

function drawRocket(cx,cy,s){
  // Body
  ctx.beginPath();ctx.moveTo(cx,cy-s*.35);ctx.lineTo(cx-s*.1,cy-s*.1);ctx.lineTo(cx-s*.1,cy+s*.2);ctx.lineTo(cx+s*.1,cy+s*.2);ctx.lineTo(cx+s*.1,cy-s*.1);ctx.closePath();ctx.stroke();
  // Nose cone curve
  ctx.beginPath();ctx.moveTo(cx-s*.1,cy-s*.1);ctx.quadraticCurveTo(cx,cy-s*.25,cx+s*.1,cy-s*.1);ctx.stroke();
  // Window
  ctx.beginPath();ctx.arc(cx,cy-s*.05,r*.06,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy-s*.05,r*.03,0,Math.PI*2);ctx.stroke();
  // Fins
  ctx.beginPath();ctx.moveTo(cx-s*.1,cy+s*.05);ctx.lineTo(cx-s*.18,cy+s*.22);ctx.lineTo(cx-s*.1,cy+s*.18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+s*.1,cy+s*.05);ctx.lineTo(cx+s*.18,cy+s*.22);ctx.lineTo(cx+s*.1,cy+s*.18);ctx.stroke();
  // Flame
  ctx.beginPath();ctx.moveTo(cx-s*.06,cy+s*.2);ctx.quadraticCurveTo(cx-s*.04,cy+s*.32,cx,cy+s*.38);ctx.quadraticCurveTo(cx+.04,cy+s*.32,cx+s*.06,cy+s*.2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-s*.02,cy+s*.2);ctx.quadraticCurveTo(cx,cy+s*.3,cx+.02,cy+s*.2);ctx.stroke();
  // Stars
  const starDraw=(xx,yy)=>{
    ctx.beginPath();
    for(let i=0;i<5;i++){const a=(i*2*Math.PI)/5-Math.PI/2;const rr=i===0?r*.04:r*.018;i===0?ctx.moveTo(xx+Math.cos(a)*rr,yy+Math.sin(a)*rr):ctx.lineTo(xx+Math.cos(a)*rr,yy+Math.sin(a)*rr);}
    ctx.closePath();ctx.stroke();
  };
  starDraw(cx-s*.22,cy-s*.25);
  starDraw(cx+s*.18,cy-s*.3);
  starDraw(cx-s*.15,cy-s*.35);
}

function drawUnicorn(cx,cy,s){
  const r=s*.08;
  // Head
  ctx.beginPath();ctx.arc(cx+r*.5,cy-r*.4,r*2.2,0,Math.PI*2);ctx.stroke();
  // Muzzle
  ctx.beginPath();ctx.arc(cx+r*3,cy+r*.3,r,0,Math.PI*2);ctx.stroke();
  // Nostril
  ctx.beginPath();ctx.arc(cx+r*3.3,cy+r*.2,r*.2,0,Math.PI*2);ctx.fill();
  // Eye
  ctx.beginPath();ctx.ellipse(cx+r*1.8,cy-r*.8,r*.35,r*.55,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+r*1.9,cy-r*.75,r*.18,0,Math.PI*2);ctx.fill();
  // Eyelashes
  ctx.beginPath();ctx.moveTo(cx+r*1.4,cy-r*1.2);ctx.lineTo(cx+r*1.2,cy-r*1.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*1.7,cy-r*1.3);ctx.lineTo(cx+r*1.6,cy-r*1.6);ctx.stroke();
  // Ear
  ctx.beginPath();ctx.moveTo(cx-r*.5,cy-r*2);ctx.lineTo(cx-r*1.2,cy-r*3.2);ctx.lineTo(cx+r*.5,cy-r*2.2);ctx.stroke();
  // Horn
  ctx.beginPath();ctx.moveTo(cx+r*.5,cy-r*2.2);ctx.lineTo(cx+r*1.5,cy-r*4.5);ctx.lineTo(cx+r*2.3,cy-r*2.5);ctx.stroke();
  for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(cx+r*(1+i*.4),cy-r*(2.5+i*.6));ctx.lineTo(cx+r*(1.2+i*.4),cy-r*(3+i*.6));ctx.stroke();}
  // Mane
  for(let i=0;i<6;i++){
    const t=(i-1)/5;
    const mcx=cx+r*(-1+t*2.5);
    const mcy=cy-r*(1.5+Math.sin(t*Math.PI)*1.2);
    ctx.beginPath();ctx.arc(mcx,mcy,r*.8,Math.PI*.7,Math.PI*1.5);ctx.stroke();
  }
  // Body
  ctx.beginPath();ctx.moveTo(cx-r*1.5,cy+r*.5);ctx.quadraticCurveTo(cx-r*2.5,cy+r*2,cx-r*1,cy+r*4);ctx.lineTo(cx+r*1,cy+r*4);ctx.quadraticCurveTo(cx+r*2,cy+r*2,cx+r*2.2,cy+r*.5);ctx.stroke();
  // Legs
  for(let lx of[cx-r*.8,cx+r*.8]){
    ctx.moveTo(lx,cy+r*3.5);ctx.lineTo(lx,cy+r*5.5);
    ctx.beginPath();ctx.moveTo(lx-.3,cy+r*3.8);ctx.lineTo(lx-.3,cy+r*5.5);ctx.lineTo(lx+.3,cy+r*5.5);ctx.lineTo(lx+.3,cy+r*3.8);ctx.stroke();
  }
  // Tail
  ctx.beginPath();ctx.moveTo(cx-r*1,cy+r*3.5);ctx.quadraticCurveTo(cx-r*3,cy+r*2,cx-r*3.5,cy+r*4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-r*3,cy+r*2);ctx.quadraticCurveTo(cx-r*4,cy+r*2.5,cx-r*3.8,cy+r*3.5);ctx.stroke();
  // Sparkles around horn
  for(let i=0;i<3;i++){
    const sx=cx+r*(1+i),sy=cy-r*(3.5+i*.5);
    ctx.beginPath();ctx.moveTo(sx,sy-r*.15);ctx.lineTo(sx,sy+r*.15);ctx.moveTo(sx-r*.15,sy);ctx.lineTo(sx+r*.15,sy);ctx.stroke();
  }
}

function drawTree(cx,cy,s){
  // Trunk
  ctx.beginPath();ctx.moveTo(cx-s*.04,cy+s*.2);ctx.lineTo(cx-s*.06,cy);ctx.lineTo(cx+s*.06,cy);ctx.lineTo(cx+s*.04,cy+s*.2);ctx.closePath();ctx.stroke();
  // Bark lines
  ctx.beginPath();ctx.moveTo(cx,cy+.05);ctx.lineTo(cx,cy+s*.15);ctx.stroke();
  // Foliage layers
  for(let i=0;i<4;i++){
    const fy=cy-s*.05-i*s*.08;
    const fr=s*.15-i*s*.02;
    ctx.beginPath();ctx.moveTo(cx-fr,fy+fr*.3);ctx.quadraticCurveTo(cx-fr*1.2,fy,cx,fy-fr*.5);ctx.quadraticCurveTo(cx+fr*1.2,fy,cx+fr,fy+fr*.3);ctx.stroke();
  }
  // Apples/dots
  for(let i=0;i<5;i++){
    const ax=cx+(Math.random()-.5)*s*.2;
    const ay=cy-s*.1-Math.random()*s*.15;
    ctx.beginPath();ctx.arc(ax,ay,r*.035,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax,ay-r*.035);ctx.lineTo(ax,ay-r*.06);ctx.stroke();
  }
  // Ground
  ctx.beginPath();ctx.moveTo(cx-s*.25,cy+s*.2);ctx.quadraticCurveTo(cx,cy+s*.22,cx+s*.25,cy+s*.2);ctx.stroke();
  // Grass tufts
  for(let gx=cx-s*.2;gx<=cx+s*.2;gx+=s*.08){
    ctx.beginPath();ctx.moveTo(gx,cy+s*.2);ctx.quadraticCurveTo(gx-.02,cy+s*.16,gx,cy+s*.12);ctx.stroke();
  }
}

function drawOwl(cx,cy,s){
  const r=s*.05;
  // Body
  ctx.beginPath();ctx.ellipse(cx,cy,s*.12,s*.18,0,0,Math.PI*2);ctx.stroke();
  // Belly
  ctx.beginPath();ctx.ellipse(cx,cy+r*2,s*.08,s*.1,0,0,Math.PI*2);ctx.stroke();
  // Eye circles
  ctx.beginPath();ctx.arc(cx-r*1.2,cy-r*1.5,r*1.6,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+r*1.2,cy-r*1.5,r*1.6,0,Math.PI*2);ctx.stroke();
  // Pupils
  ctx.beginPath();ctx.arc(cx-r*1.2,cy-r*1.5,r*.7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*1.2,cy-r*1.5,r*.7,0,Math.PI*2);ctx.fill();
  // Beak
  ctx.beginPath();ctx.moveTo(cx,cy-r*.5);ctx.lineTo(cx-r*.6,cy+.2);ctx.lineTo(cx+r*.6,cy+.2);ctx.closePath();ctx.stroke();
  // Ear tufts
  ctx.beginPath();ctx.moveTo(cx-r*2,cy-r*3.2);ctx.lineTo(cx-r*2.5,cy-r*4.5);ctx.lineTo(cx-r*1.2,cy-r*3.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*2,cy-r*3.2);ctx.lineTo(cx+r*2.5,cy-r*4.5);ctx.lineTo(cx+r*1.2,cy-r*3.5);ctx.stroke();
  // Wings
  ctx.beginPath();ctx.moveTo(cx-r*2,cy-r*2);ctx.quadraticCurveTo(cx-r*3.5,cy,cx-r*2.5,cy+r*3);ctx.quadraticCurveTo(cx-r*2,cy+r*2,cx-r*1.5,cy+r*1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+r*2,cy-r*2);ctx.quadraticCurveTo(cx+r*3.5,cy,cx+r*2.5,cy+r*3);ctx.quadraticCurveTo(cx+r*2,cy+r*2,cx+r*1.5,cy+r*1);ctx.stroke();
  // Feet
  for(let fx of[cx-r*1,cx+r*1]){
    ctx.beginPath();ctx.moveTo(fx,cy+r*3.5);ctx.lineTo(fx-r*.5,cy+r*4.5);ctx.moveTo(fx,cy+r*3.5);ctx.lineTo(fx,cy+r*4.5);ctx.moveTo(fx,cy+r*3.5);ctx.lineTo(fx+r*.5,cy+r*4.5);ctx.stroke();
  }
  // Branch
  ctx.beginPath();ctx.moveTo(cx-s*.35,cy+r*3.8);ctx.quadraticCurveTo(cx,cy+r*4.2,cx+s*.35,cy+r*3.8);ctx.stroke();
  // Moon
  ctx.beginPath();ctx.arc(cx+s*.3,cy-s*.28,r*.08,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx+s*.33,cy-s*.3,r*.06,0,Math.PI*2);ctx.stroke();
}

function drawCastle(cx,cy,s){
  // Main walls
  ctx.strokeRect(cx-s*.18,cy-s*.05,s*.36,s*.3);
  // Towers
  ctx.strokeRect(cx-s*.22,cy-s*.12,s*.08,s*.37);
  ctx.strokeRect(cx+s*.14,cy-s*.12,s*.08,s*.37);
  // Tower tops (crenellations)
  for(let tx of[cx-s*.22,cx+s*.14]){
    for(let i=0;i<3;i++){ctx.strokeRect(tx+i*s*.03,cy-s*.18,s*.02,s*.06);}
  }
  // Main crenellations
  for(let i=0;i<5;i++){ctx.strokeRect(cx-s*.12+i*s*.05,cy-s*.1,s*.03,s*.05);}
  // Door
  ctx.beginPath();ctx.moveTo(cx-s*.05,cy+s*.25);ctx.lineTo(cx-s*.05,cy+s*.15);ctx.quadraticCurveTo(cx,cy+s*.1,cx+s*.05,cy+s*.15);ctx.lineTo(cx+s*.05,cy+s*.25);ctx.stroke();
  // Door handle
  ctx.beginPath();ctx.arc(cx+s*.03,cy+s*.2,r*.01,0,Math.PI*2);ctx.stroke();
  // Windows
  ctx.strokeRect(cx-s*.08,cy-s*.02,s*.04,s*.06);
  ctx.strokeRect(cx+s*.04,cy-s*.02,s*.04,s*.06);
  ctx.beginPath();ctx.moveTo(cx-s*.06,cy+.01);ctx.lineTo(cx-s*.04,cy+.01);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-s*.06,cy+.01);ctx.lineTo(cx-s*.06,cy+.03);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+s*.06,cy+.01);ctx.lineTo(cx+s*.04,cy+.01);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+s*.06,cy+.01);ctx.lineTo(cx+s*.06,cy+.03);ctx.stroke();
  // Flag
  ctx.beginPath();ctx.moveTo(cx,cy-s*.18);ctx.lineTo(cx,cy-s*.32);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-s*.32);ctx.lineTo(cx+s*.07,cy-s*.3);ctx.lineTo(cx,cy-s*.27);ctx.stroke();
  // Ground
  ctx.beginPath();ctx.moveTo(cx-s*.35,cy+s*.3);ctx.lineTo(cx+s*.35,cy+s*.3);ctx.stroke();
}

const pageNames=['Butterfly','House','Cat','Flower','Fish','Dinosaur','Ice Cream','Car','Rocket','Unicorn','Tree','Owl','Castle'];
let currentPage=0;

function switchToPage(idx){
  currentPage=idx;
  drawPage(idx);
  document.getElementById('page-name').textContent=pageNames[idx];
  document.querySelectorAll('.page-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

function buildPageDots(){
  const container=document.getElementById('page-dots');
  container.innerHTML='';
  pageNames.forEach((name,i)=>{
    const dot=document.createElement('span');
    dot.className='page-dot'+(i===0?' active':'');
    dot.title=name;
    dot.addEventListener('click',()=>{switchToPage(i);playBeep(400,.08,'sine');});
    container.appendChild(dot);
  });
}

// ---- Event Handlers ----
function getCanvasPos(e){
  const rect=canvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:cx-rect.left,y:cy-rect.top};
}

canvas.addEventListener('mousedown',function(e){
  e.preventDefault();
  const pos=getCanvasPos(e);
  if(currentTool==='fill'){
    pushUndo();
    floodFill(pos.x,pos.y,currentColor);
    sparkle(pos.x+canvas.getBoundingClientRect().left,pos.y+canvas.getBoundingClientRect().top);
    playBeep(500,.12,'triangle');
  }else{
    pushUndo();
    drawing=true;
    lastX=pos.x;lastY=pos.y;
    ctx.beginPath();ctx.arc(lastX,lastY,8,0,Math.PI*2);
    ctx.fillStyle=currentColor;
    ctx.fill();
  }
});
canvas.addEventListener('mousemove',function(e){
  if(!drawing||currentTool!=='brush')return;
  e.preventDefault();
  const pos=getCanvasPos(e);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(pos.x,pos.y);
  ctx.strokeStyle=currentColor;ctx.lineWidth=12;ctx.stroke();
  lastX=pos.x;lastY=pos.y;
});
canvas.addEventListener('mouseup',function(){drawing=false});
canvas.addEventListener('mouseleave',function(){drawing=false});

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  const pos=getCanvasPos(e);
  if(currentTool==='fill'){
    pushUndo();
    floodFill(pos.x,pos.y,currentColor);
    sparkle(pos.x+canvas.getBoundingClientRect().left,pos.y+canvas.getBoundingClientRect().top);
    playBeep(500,.12,'triangle');
  }else{
    pushUndo();
    drawing=true;
    lastX=pos.x;lastY=pos.y;
    ctx.beginPath();ctx.arc(lastX,lastY,8,0,Math.PI*2);
    ctx.fillStyle=currentColor;
    ctx.fill();
  }
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(!drawing||currentTool!=='brush')return;
  const pos=getCanvasPos(e);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(pos.x,pos.y);
  ctx.strokeStyle=currentColor;ctx.lineWidth=12;ctx.stroke();
  lastX=pos.x;lastY=pos.y;
},{passive:false});
canvas.addEventListener('touchend',function(){drawing=false});

// Tool switching
document.getElementById('btn-fill').addEventListener('click',function(){
  currentTool='fill';
  document.getElementById('btn-fill').classList.add('active');
  document.getElementById('btn-brush').classList.remove('active');
  canvas.style.cursor='crosshair';
});
document.getElementById('btn-brush').addEventListener('click',function(){
  currentTool='brush';
  document.getElementById('btn-brush').classList.add('active');
  document.getElementById('btn-fill').classList.remove('active');
  canvas.style.cursor='crosshair';
});

// Color selection
document.querySelectorAll('.color-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('selected'));
    this.classList.add('selected');
    currentColor=this.dataset.color;
  });
});

// Page navigation
document.getElementById('btn-prev').addEventListener('click',()=>{
  const idx=(currentPage-1+pageNames.length)%pageNames.length;
  switchToPage(idx);
  playBeep(400,.08,'sine');
});
document.getElementById('btn-next').addEventListener('click',()=>{
  const idx=(currentPage+1)%pageNames.length;
  switchToPage(idx);
  playBeep(400,.08,'sine');
});

// Actions
document.getElementById('btn-undo').addEventListener('click',()=>{
  undo();
  playBeep(350,.12,'sine');
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  drawPage(currentPage);
  playBeep(250,.15,'sine');
});
document.getElementById('btn-clear').addEventListener('click',()=>{
  pushUndo();
  // Redraw outlines only
  const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  drawPage(currentPage);
  // But we want to keep outlines... actually drawPage clears everything including colors
  // So just redrawing the page effectively clears colors but keeps outlines
  const rect=canvas.getBoundingClientRect();
  sparkle(rect.left+rect.width/2,rect.top+rect.height/2);
  playBeep(200,.3,'sawtooth');
});
document.getElementById('btn-save').addEventListener('click',()=>{
  const link=document.createElement('a');
  link.download='my-coloring-'+pageNames[currentPage].toLowerCase()+'-'+Date.now()+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
  sparkle(canvas.getBoundingClientRect().left+40,canvas.getBoundingClientRect().top+30);
  playBeep(523,.1,'sine');
  setTimeout(()=>playBeep(659,.1,'sine'),100);
  setTimeout(()=>playBeep(784,.15,'sine'),200);
});

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'){e.preventDefault();document.getElementById('btn-prev').click();}
  if(e.key==='ArrowRight'){e.preventDefault();document.getElementById('btn-next').click();}
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();document.getElementById('btn-save').click();}
});

// Init
buildPageDots();
switchToPage(0);
window.addEventListener('resize',()=>{
  const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  resizeCanvas();
  ctx.putImageData(imgData,0,0);
});

console.log('Coloring Book ready! 8 pages to color.');
})();
</script>
</body>
</html>
