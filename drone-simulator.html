<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commercial Drone Physics Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #controls { position: absolute; bottom: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Drone Simulator</h1>
        <div id="telemetry">
            Altitude: <span id="alt">0</span>m<br>
            Velocity: <span id="vel">0</span>m/s
        </div>
    </div>
    <div id="controls">
        W/S: Pitch | A/D: Roll | Q/E: Yaw | Shift/Ctrl: Throttle
    </div>

    <!-- CDN imports -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Initialize Simulator...
        console.log("Initializing Drone Simulator...");

        // Setup Physics
        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
        
        // Ground
        const groundBody = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // Drone
        const droneBody = new CANNON.Body({ mass: 1, shape: new CANNON.Box(new CANNON.Vec3(0.5, 0.1, 0.5)) });
        droneBody.position.set(0, 5, 0);
        world.addBody(droneBody);

        // Setup Visuals
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeeeeee); // Light background
        scene.add(new THREE.AmbientLight(0xffffff, 1.0)); // Brighter ambient
        const dirLight = new THREE.DirectionalLight(0xffffff, 2); // Add directional light
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        
        // Drone Mesh (Lighter color)
        const droneMesh = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.2, 1),
            new THREE.MeshStandardMaterial({ color: 0xcc3333 })
        );
        scene.add(droneMesh);
        
        // Ground Mesh
        const groundMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x444444 })
        );
        groundMesh.rotation.x = -Math.PI / 2;
        scene.add(groundMesh);
        
        // Flight Inputs
        const keys = { w: false, s: false, a: false, d: false, q: false, e: false, shift: false, ctrl: false };
        window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        
        function animate() {
            requestAnimationFrame(animate);
            world.fixedStep();
            
            // Physics-to-Visual Sync
            droneMesh.position.copy(droneBody.position);
            droneMesh.quaternion.copy(droneBody.quaternion);

            // Flight Logic
            let throttle = (keys.shift ? 15 : 0) - (keys.ctrl ? 5 : 0);
            droneBody.applyLocalForce(new CANNON.Vec3(0, throttle, 0), new CANNON.Vec3(0, 0, 0));
            
            // Basic Rotation
            if (keys.w) droneBody.applyLocalTorque(new CANNON.Vec3(-1, 0, 0));
            if (keys.s) droneBody.applyLocalTorque(new CANNON.Vec3(1, 0, 0));
            if (keys.a) droneBody.applyLocalTorque(new CANNON.Vec3(0, 0, 1));
            if (keys.d) droneBody.applyLocalTorque(new CANNON.Vec3(0, 0, -1));

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
