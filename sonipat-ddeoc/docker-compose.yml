version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sonipat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sonipat_ddeoc}
      POSTGRES_USER: ${POSTGRES_USER:-sonipat_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sonipat_password_2022}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonipat_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sonipat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sonipat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sonipat_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password_2022}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: sonipat-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_password_2022}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sonipat_ddeoc}
      KC_DB_USERNAME: ${POSTGRES_USER:-sonipat_admin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-sonipat_password_2022}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  celery-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sonipat-celery-worker
    command: celery -A app.worker worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-sonipat_admin}:${POSTGRES_PASSWORD:-sonipat_password_2022}@postgres:5432/${POSTGRES_DB:-sonipat_ddeoc}
    depends_on:
      - redis
      - postgres

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sonipat-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sonipat_admin}:${POSTGRES_PASSWORD:-sonipat_password_2022}@postgres:5432/${POSTGRES_DB:-sonipat_ddeoc}
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sonipat-ddeoc}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-sonipat-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-sonipat-api-secret}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-sonipat_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_password_2022}
      TZ: Asia/Kolkata
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sonipat-web
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sonipat-ddeoc}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-sonipat-web}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
