<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrari 3D Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: system-ui, -apple-system, sans-serif; }
  #canvas-container { width: 100%; height: 100%; position: relative; }
  canvas { display: block; }

  #loading-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.6s ease-out;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 64px; height: 64px; border: 4px solid rgba(255,255,255,0.1);
    border-top-color: #e94560; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { color: #fff; margin-top: 20px; font-size: 15px; letter-spacing: 0.5px; }
  #loading-bar-outer {
    width: 240px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
    margin-top: 16px; overflow: hidden;
  }
  #loading-bar-inner {
    height: 100%; width: 0%; background: linear-gradient(90deg, #e94560, #ff6b6b);
    border-radius: 2px; transition: width 0.3s ease;
  }

  #error-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(26,26,46,0.95);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    color: #fff;
  }
  #error-overlay.visible { display: flex; }
  #error-overlay h2 { font-size: 24px; margin-bottom: 12px; color: #e94560; }
  #error-overlay p { font-size: 14px; color: #aaa; max-width: 400px; text-align: center; line-height: 1.6; }
  #retry-btn {
    margin-top: 24px; padding: 12px 32px; background: #e94560; color: #fff; border: none;
    border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s;
    font-family: inherit;
  }
  #retry-btn:hover { background: #c73650; }

  #info-panel {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
    color: #fff; padding: 8px 20px; border-radius: 24px; font-size: 13px;
    letter-spacing: 0.3px; pointer-events: none;
    border: 1px solid rgba(255,255,255,0.1);
  }

  #controls-hint {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); z-index: 10;
    color: rgba(255,255,255,0.4); font-size: 11px; pointer-events: none;
    transition: opacity 1.5s ease;
  }

  #color-picker-panel {
    position: fixed; top: 16px; right: 16px; z-index: 20;
    display: flex; gap: 8px; flex-wrap: wrap;
    max-width: 200px; justify-content: flex-end;
  }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.2s, transform 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.active { border-color: #fff; transform: scale(1.15); }

  @media (max-width: 768px) {
    #info-panel { font-size: 11px; padding: 6px 16px; bottom: 12px; }
    #controls-hint { bottom: 55px; font-size: 10px; }
    #loading-bar-outer { width: 180px; }
    #color-picker-panel { top: 10px; right: 8px; gap: 6px; }
    .color-swatch { width: 24px; height: 24px; }
    #car-view-presets { top: 42px; gap: 4px; }
    .car-view-btn { padding: 4px 10px; font-size: 10px; }
  }

  .car-view-btn:hover { background: rgba(255,255,255,0.2) !important; border-color: rgba(255,255,255,0.4) !important; }
  .car-view-btn.active { background: rgba(100,200,255,0.25) !important; color: #fff !important; border-color: rgba(100,200,255,0.6) !important; }

  footer {
    position: fixed; bottom: -2px; left: 0; right: 0; z-index: 5;
    text-align: center; padding: 6px; opacity: 0.35;
    font-size: 10px; font-family: system-ui; color: #999;
    pointer-events: none;
  }
  footer a { color: #e94560; text-decoration: none; pointer-events: auto; }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="loading-overlay">
  <div class="loader-ring"></div>
  <div id="loading-text">Loading Ferrari model...</div>
  <div id="loading-bar-outer"><div id="loading-bar-inner"></div></div>
</div>

<div id="error-overlay">
  <h2>Failed to Load Model</h2>
  <p>Could not load the 3D car model. Check your network connection and try again.</p>
  <button id="retry-btn" onclick="location.reload()">Retry</button>
</div>

<div id="color-picker-panel">
  <div class="color-swatch active" style="background:#cc0000" data-color="#cc0000" title="Rosso Corsa"></div>
  <div class="color-swatch" style="background:#1a1a1a" data-color="#1a1a1a" title="Black"></div>
  <div class="color-swatch" style="background:#f5f5f5" data-color="#f5f5f5" title="White"></div>
  <div class="color-swatch" style="background:#003399" data-color="#003399" title="Blue"></div>
  <div class="color-swatch" style="background:#ffd700" data-color="#ffd700" title="Yellow"></div>
</div>

<div id="controls-hint">Drag to rotate &bull; Scroll to zoom &bull; Right-drag to pan</div>
<div id="info-panel">Ferrari &mdash; Low-poly concept model</div>

<div id="car-view-presets" style="position:fixed;top:55px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:8px;">
  <button class="car-view-btn" data-view="front" style="background:rgba(255,255,255,0.1);color:#ccc;border:1px solid rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:system-ui;transition:all 0.2s;">Front</button>
  <button class="car-view-btn" data-view="side" style="background:rgba(255,255,255,0.1);color:#ccc;border:1px solid rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:system-ui;transition:all 0.2s;">Side</button>
  <button class="car-view-btn" data-view="top" style="background:rgba(255,255,255,0.1);color:#ccc;border:1px solid rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:system-ui;transition:all 0.2s;">Top</button>
  <button class="car-view-btn" data-view="back" style="background:rgba(255,255,255,0.1);color:#ccc;border:1px solid rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:system-ui;transition:all 0.2s;">Back</button>
  <button id="btn-car-360" style="background:rgba(255,255,255,0.1);color:#ccc;border:1px solid rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:system-ui;transition:all 0.2s;">360 Spin</button>
</div>

<footer><a href="https://nebulacloud.studio">Built with NebulaCloud Studio</a></footer>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const container = document.getElementById('canvas-container');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');
const loadingBar = document.getElementById('loading-bar-inner');
const errorOverlay = document.getElementById('error-overlay');
const infoPanel = document.getElementById('info-panel');
const controlsHint = document.getElementById('controls-hint');
const colorSwatches = document.querySelectorAll('.color-swatch');

let carBody = null;
let currentColor = '#cc0000';

const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');
scene.fog = new THREE.Fog('#1a1a2e', 8, 40);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(4, 1.8, 5);
camera.lookAt(0, 0.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 12;
controls.maxPolarAngle = Math.PI * 0.7;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;
controls.update();

const ambientLight = new THREE.AmbientLight('#404060', 1.5);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight('#ffffff', 6);
keyLight.position.set(8, 10, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 50;
keyLight.shadow.camera.left = -10;
keyLight.shadow.camera.right = 10;
keyLight.shadow.camera.top = 10;
keyLight.shadow.camera.bottom = -10;
keyLight.shadow.bias = -0.0001;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight('#8899cc', 2);
fillLight.position.set(-3, 3, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight('#ffccaa', 3);
rimLight.position.set(0, 1, -5);
scene.add(rimLight);

const groundGeometry = new THREE.CircleGeometry(12, 64);
const groundMaterial = new THREE.MeshStandardMaterial({ color: '#2a2a3a', roughness: 0.7, metalness: 0.1 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.2;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.PolarGridHelper(6, 32, 24, 128, '#333355', '#333355');
gridHelper.position.y = -1.19;
scene.add(gridHelper);

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

function updateLoading(progress) {
  const pct = Math.round(progress * 100);
  loadingBar.style.width = pct + '%';
  loadingText.textContent = `Loading Ferrari model... ${pct}%`;
}

gltfLoader.load(
  'car_model.glb',
  (gltf) => {
    const model = gltf.scene;
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;

        const name = child.name.toLowerCase();
        const materialName = child.material?.name?.toLowerCase() || '';

        if (name.includes('body') || name.includes('paint') || name.includes('shell') ||
            materialName.includes('body') || materialName.includes('paint') || materialName.includes('car')) {
          carBody = child;
          child.material = child.material.clone();
        }

        if (child.material) {
          child.material.roughness = Math.min(child.material.roughness || 0.5, 0.6);
          child.material.metalness = Math.max(child.material.metalness || 0.1, 0.3);
        }
      }
    });

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 3.5 / maxDim;
    model.scale.setScalar(scale);
    model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);

    scene.add(model);

    controls.target.set(0, size.y * scale * 0.3, 0);
    controls.update();

    infoPanel.textContent = 'Ferrari — Drag to rotate, scroll to zoom, right-drag to pan';

    loadingOverlay.classList.add('hidden');
    setTimeout(() => { controlsHint.style.opacity = '0'; }, 6000);
  },
  (xhr) => {
    if (xhr.total > 0) {
      updateLoading(xhr.loaded / xhr.total);
    } else {
      updateLoading(0.5);
    }
  },
  (error) => {
    console.error('Model load error:', error);
    loadingOverlay.classList.add('hidden');
    errorOverlay.classList.add('visible');
  }
);

function applyCarColor(hexColor) {
  if (!carBody) return;
  const color = new THREE.Color(hexColor);

  if (Array.isArray(carBody.material)) {
    carBody.material.forEach(m => setMaterialColor(m, color));
  } else {
    setMaterialColor(carBody.material, color);
  }
}

function setMaterialColor(material, color) {
  material.color = color;
  material.needsUpdate = true;
}

colorSwatches.forEach(swatch => {
  swatch.addEventListener('click', () => {
    colorSwatches.forEach(s => s.classList.remove('active'));
    swatch.classList.add('active');
    currentColor = swatch.dataset.color;
    applyCarColor(currentColor);
  });
});

let carSpin360Active = false;
let carSpinAngle = 0;
let carSpinSpeed = 0.5;
let carSpinDist = 5;
let carSpinHeight = 2;

const carViewBtns = document.querySelectorAll('.car-view-btn');
const btnCar360 = document.getElementById('btn-car-360');

carViewBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    carSpin360Active = false;
    btnCar360.classList.remove('active');
    controls.autoRotate = false;
    carViewBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.dataset.view;
    const d = 5;
    switch (view) {
      case 'front':
        camera.position.set(0, 0.5, d);
        controls.target.set(0, 0.5, 0);
        break;
      case 'side':
        camera.position.set(d, 0.5, 0);
        controls.target.set(0, 0.5, 0);
        break;
      case 'top':
        camera.position.set(0, d, 0.1);
        controls.target.set(0, 0.5, 0);
        break;
      case 'back':
        camera.position.set(0, 0.5, -d);
        controls.target.set(0, 0.5, 0);
        break;
    }
    controls.update();
  });
});

btnCar360.addEventListener('click', () => {
  carSpin360Active = !carSpin360Active;
  btnCar360.classList.toggle('active', carSpin360Active);
  carViewBtns.forEach(b => b.classList.remove('active'));
  if (carSpin360Active) {
    controls.autoRotate = false;
    const pos = camera.position;
    carSpinDist = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
    carSpinHeight = pos.y;
    carSpinAngle = Math.atan2(pos.z, pos.x);
  } else {
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;
  }
});

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

let isInteracting = false;
controls.addEventListener('start', () => { isInteracting = true; controlsHint.style.opacity = '0'; });
controls.addEventListener('end', () => { isInteracting = false; });

const carClock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(carClock.getDelta(), 0.1);

  if (carSpin360Active) {
    carSpinAngle += carSpinSpeed * dt;
    camera.position.set(
      Math.cos(carSpinAngle) * carSpinDist,
      carSpinHeight,
      Math.sin(carSpinAngle) * carSpinDist
    );
    camera.lookAt(0, 0.5, 0);
    controls.target.set(0, 0.5, 0);
  } else {
    controls.update();
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
