<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Barbie Dress-Up Party</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1a0a2e;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
  touch-action: pan-x pan-y pinch-zoom;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#canvas-container {
  position: fixed;
  inset: 0;
  z-index: 1;
}

#canvas-container canvas {
  display: block;
}

#ui-layer {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

#ui-layer > * {
  pointer-events: auto;
}

#top-bar {
  position: absolute;
  top: 12px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  padding: 0 16px;
}

#title {
  background: linear-gradient(135deg, #ff69b4, #ff1493);
  color: white;
  padding: 10px 28px;
  border-radius: 30px;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 20px rgba(255,105,180,0.4);
  text-align: center;
}

#bottom-controls {
  background: linear-gradient(180deg, transparent, rgba(26,10,46,0.95) 30%);
  padding: 8px 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#main-tabs {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.tab-btn {
  min-width: 44px;
  min-height: 44px;
  padding: 10px 16px;
  border-radius: 24px;
  border: 2px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.tab-btn:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
.tab-btn.active { border-color: #ff69b4; background: rgba(255,105,180,0.3); box-shadow: 0 0 16px rgba(255,105,180,0.3); }

#panel {
  background: rgba(30,15,50,0.92);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  max-height: 260px;
  overflow-y: auto;
  display: none;
}

#panel.visible { display: block; }

.panel-title {
  color: #ffb6d9;
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  text-align: center;
}

.swatch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
  gap: 8px;
  justify-items: center;
}

.swatch {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: white; box-shadow: 0 0 12px currentColor; }

.style-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.style-btn {
  min-height: 44px;
  padding: 10px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.style-btn:hover { background: rgba(255,255,255,0.12); }
.style-btn.active { border-color: #ff69b4; background: rgba(255,105,180,0.25); }

.accessory-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.accessory-btn {
  min-height: 44px;
  padding: 10px 8px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.accessory-btn:hover { background: rgba(255,255,255,0.12); }
.accessory-btn.on { border-color: #ffd700; background: rgba(255,215,0,0.25); }

#party-btn {
  min-height: 50px;
  padding: 12px 32px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #ff69b4, #ff1493, #ff69b4);
  background-size: 200% 100%;
  color: white;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 1px;
  animation: shimmer 2s infinite;
  box-shadow: 0 4px 24px rgba(255,105,180,0.5);
  transition: transform 0.15s;
}

#party-btn:hover { transform: scale(1.05); }
#party-btn:active { transform: scale(0.95); }

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

#celebration-overlay {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  display: none;
}

#celebration-overlay.active {
  display: block;
  animation: fadeInOut 3s forwards;
}

@keyframes fadeInOut {
  0% { opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { opacity: 0; }
}

.celebration-text {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.5rem;
  font-weight: 900;
  color: #ffd700;
  text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493;
  animation: bounceIn 0.6s ease-out;
  text-align: center;
}

@keyframes bounceIn {
  0% { transform: translate(-50%, -50%) scale(0); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

#hint {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.5);
  font-size: 0.7rem;
  pointer-events: none;
}

#footer {
  position: absolute;
  bottom: 4px;
  right: 12px;
  z-index: 3;
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  pointer-events: none;
}

#footer a { color: rgba(255,105,180,0.5); text-decoration: none; }

@media (min-width: 768px) {
  #bottom-controls { padding: 12px 24px 20px; }
  #main-tabs { gap: 10px; }
  .tab-btn { font-size: 0.9rem; padding: 12px 20px; }
  #panel { max-height: 200px; padding: 18px; max-width: 600px; margin: 0 auto; width: 100%; }
  .style-grid { grid-template-columns: repeat(4, 1fr); }
  .accessory-grid { grid-template-columns: repeat(5, 1fr); }
  .celebration-text { font-size: 3.5rem; }
}

@media (max-width: 374px) {
  .tab-btn { font-size: 0.7rem; padding: 8px 10px; min-width: 38px; min-height: 38px; }
  .swatch { width: 34px; height: 34px; }
}
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
  <div id="top-bar">
    <div id="title">Barbie Dress-Up Party</div>
  </div>

  <div id="bottom-controls">
    <div id="main-tabs">
      <button class="tab-btn active" data-panel="dress">👗 Dress</button>
      <button class="tab-btn" data-panel="colors">🎨 Colors</button>
      <button class="tab-btn" data-panel="accessories">👑 Accessories</button>
      <button class="tab-btn" data-panel="scene">🎭 Scene</button>
      <button id="party-btn">✨ Party Ready!</button>
    </div>

    <div id="panel" class="visible">
      <div id="panel-dress" class="panel-content">
        <div class="panel-title">Choose Dress Style</div>
        <div class="style-grid" id="style-grid"></div>
      </div>
      <div id="panel-colors" class="panel-content" style="display:none">
        <div class="panel-title">Dress Color</div>
        <div class="swatch-grid" id="dress-colors"></div>
        <div class="panel-title" style="margin-top:10px">Hair Color</div>
        <div class="swatch-grid" id="hair-colors"></div>
        <div class="panel-title" style="margin-top:10px">Skin Tone</div>
        <div class="swatch-grid" id="skin-colors"></div>
        <div class="panel-title" style="margin-top:10px">Shoe Color</div>
        <div class="swatch-grid" id="shoe-colors"></div>
      </div>
      <div id="panel-accessories" class="panel-content" style="display:none">
        <div class="panel-title">Tap to Toggle Accessories</div>
        <div class="accessory-grid" id="accessory-grid"></div>
      </div>
      <div id="panel-scene" class="panel-content" style="display:none">
        <div class="panel-title">Choose Background</div>
        <div class="style-grid" id="scene-grid"></div>
      </div>
    </div>
  </div>

  <div id="hint">Drag to rotate ★ Pinch to zoom</div>
</div>

<div id="celebration-overlay">
  <div class="celebration-text">Party Ready! 🎉✨</div>
</div>

<div id="footer"><a href="https://nebulacloud.studio">Built with NebulaCloud Studio</a></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── STATE ──────────────────────────────────────────────
const state = {
  dressStyle: 'gown',
  dressColor: '#ff69b4',
  hairColor: '#f5d5a0',
  skinColor: '#ffd5c2',
  shoeColor: '#ff69b4',
  accessories: {
    crown: true,
    necklace: true,
    bracelet: false,
    earrings: false,
    handbag: false,
  },
  sceneTheme: 'party',
};

// ─── THREE.JS SETUP ─────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const bgColor = new THREE.Color('#1a0a2e');
scene.background = bgColor;
scene.fog = new THREE.Fog('#1a0a2e', 5, 20);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(2.5, 0.8, 5);
camera.lookAt(0, 0.4, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.4, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2.5;
controls.maxDistance = 8;
controls.maxPolarAngle = Math.PI * 0.75;
controls.minPolarAngle = 0.2;
controls.target.set(0, 0.4, 0);
controls.update();

// ─── LIGHTING ───────────────────────────────────────────
const ambientLight = new THREE.AmbientLight('#fff5f0', 1.5);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight('#ffffff', 4);
keyLight.position.set(5, 8, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 1024;
keyLight.shadow.mapSize.height = 1024;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 30;
keyLight.shadow.camera.left = -8;
keyLight.shadow.camera.right = 8;
keyLight.shadow.camera.top = 8;
keyLight.shadow.camera.bottom = -8;
keyLight.shadow.bias = -0.0001;
keyLight.shadow.normalBias = 0.02;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight('#ffccdd', 1.8);
fillLight.position.set(-3, 1, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight('#ff88cc', 2.5);
rimLight.position.set(0, 2, -4);
scene.add(rimLight);

const bottomLight = new THREE.DirectionalLight('#8866cc', 1);
bottomLight.position.set(0, -1, 1);
scene.add(bottomLight);

// ─── PODIUM ─────────────────────────────────────────────
const podiumGroup = new THREE.Group();
scene.add(podiumGroup);

const podiumGeo = new THREE.CylinderGeometry(0.9, 1.0, 0.18, 48);
const podiumMat = new THREE.MeshStandardMaterial({ color: '#ffffff', roughness: 0.3, metalness: 0.5 });
const podium = new THREE.Mesh(podiumGeo, podiumMat);
podium.position.y = -1.85;
podium.castShadow = true;
podium.receiveShadow = true;
podiumGroup.add(podium);

const podiumTopGeo = new THREE.CylinderGeometry(0.95, 0.95, 0.04, 48);
const podiumTopMat = new THREE.MeshStandardMaterial({ color: '#ffd1dc', roughness: 0.2, metalness: 0.7 });
const podiumTop = new THREE.Mesh(podiumTopGeo, podiumTopMat);
podiumTop.position.y = -1.74;
podiumTop.receiveShadow = true;
podiumGroup.add(podiumTop);

const podiumBaseGeo = new THREE.CylinderGeometry(1.05, 1.1, 0.1, 48);
const podiumBase = new THREE.Mesh(podiumBaseGeo, podiumMat);
podiumBase.position.y = -1.98;
podiumBase.receiveShadow = true;
podiumGroup.add(podiumBase);

// podium glow ring
const ringGeo = new THREE.TorusGeometry(0.93, 0.03, 16, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: '#ff69b4', roughness: 0.2, metalness: 0.4, emissive: '#ff69b4', emissiveIntensity: 0.5 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2;
ring.position.y = -1.74;
podiumGroup.add(ring);

// ─── MATERIALS ──────────────────────────────────────────
const skinMat = new THREE.MeshStandardMaterial({ color: state.skinColor, roughness: 0.65, metalness: 0.02 });
const hairMat = new THREE.MeshStandardMaterial({ color: state.hairColor, roughness: 0.35, metalness: 0.05 });
const dressMat = new THREE.MeshStandardMaterial({ color: state.dressColor, roughness: 0.3, metalness: 0.1 });
const shoeMat = new THREE.MeshStandardMaterial({ color: state.shoeColor, roughness: 0.25, metalness: 0.15 });
const accessoryGoldMat = new THREE.MeshStandardMaterial({ color: '#ffd700', roughness: 0.15, metalness: 0.9 });
const accessorySilverMat = new THREE.MeshStandardMaterial({ color: '#e8e8e8', roughness: 0.15, metalness: 0.9 });
const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: '#ffffff', roughness: 0.1, metalness: 0 });
const pupilMat = new THREE.MeshStandardMaterial({ color: '#2c1810', roughness: 0.1, metalness: 0 });
const lipMat = new THREE.MeshStandardMaterial({ color: '#e84393', roughness: 0.3, metalness: 0 });
const blushMat = new THREE.MeshStandardMaterial({ color: '#ffb3ba', roughness: 0.7, metalness: 0, transparent: true, opacity: 0.5 });

// ─── BARBIE MODEL ───────────────────────────────────────
const barbieGroup = new THREE.Group();
scene.add(barbieGroup);

// --- Body (torso + neck) ---
const bodyGroup = new THREE.Group();
barbieGroup.add(bodyGroup);

const upperBodyGeo = new THREE.CylinderGeometry(0.15, 0.11, 0.6, 32);
const upperBody = new THREE.Mesh(upperBodyGeo, skinMat);
upperBody.position.y = 1.3;
upperBody.castShadow = true;
bodyGroup.add(upperBody);

const lowerBodyGeo = new THREE.CylinderGeometry(0.11, 0.16, 0.45, 32);
const lowerBody = new THREE.Mesh(lowerBodyGeo, skinMat);
lowerBody.position.y = 0.85;
lowerBody.castShadow = true;
bodyGroup.add(lowerBody);

const neckGeo = new THREE.CylinderGeometry(0.04, 0.06, 0.18, 16);
const neck = new THREE.Mesh(neckGeo, skinMat);
neck.position.y = 1.65;
neck.castShadow = true;
bodyGroup.add(neck);

// --- Head ---
const headGroup = new THREE.Group();
headGroup.position.y = 1.95;
barbieGroup.add(headGroup);

const headGeo = new THREE.SphereGeometry(0.25, 32, 32);
const head = new THREE.Mesh(headGeo, skinMat);
head.scale.set(1, 1.08, 0.85);
head.castShadow = true;
headGroup.add(head);

// Eyes
const leftEyeGroup = new THREE.Group();
leftEyeGroup.position.set(0.08, 0.04, 0.19);
headGroup.add(leftEyeGroup);

const eyeGeo = new THREE.SphereGeometry(0.04, 16, 16);
const leftEyeWhite = new THREE.Mesh(eyeGeo, eyeWhiteMat);
leftEyeWhite.scale.set(1, 0.7, 1);
leftEyeGroup.add(leftEyeWhite);

const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 8), pupilMat);
leftPupil.position.z = 0.025;
leftEyeGroup.add(leftPupil);

const leftShine = new THREE.Mesh(new THREE.SphereGeometry(0.008, 4, 4), new THREE.MeshStandardMaterial({ color: '#ffffff', roughness: 0, metalness: 0, emissive: '#ffffff', emissiveIntensity: 0.8 }));
leftShine.position.set(0.008, 0.012, 0.032);
leftEyeGroup.add(leftShine);

const rightEyeGroup = new THREE.Group();
rightEyeGroup.position.set(-0.08, 0.04, 0.19);
headGroup.add(rightEyeGroup);

const rightEyeWhite = new THREE.Mesh(eyeGeo, eyeWhiteMat);
rightEyeWhite.scale.set(1, 0.7, 1);
rightEyeGroup.add(rightEyeWhite);

const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 8), pupilMat);
rightPupil.position.z = 0.025;
rightEyeGroup.add(rightPupil);

const rightShine = new THREE.Mesh(new THREE.SphereGeometry(0.008, 4, 4), new THREE.MeshStandardMaterial({ color: '#ffffff', roughness: 0, metalness: 0, emissive: '#ffffff', emissiveIntensity: 0.8 }));
rightShine.position.set(-0.008, 0.012, 0.032);
rightEyeGroup.add(rightShine);

// Eyelashes
function createEyelash(x, y, z, rotZ) {
  const lashGeo = new THREE.BoxGeometry(0.025, 0.006, 0.004);
  const lash = new THREE.Mesh(lashGeo, pupilMat);
  lash.position.set(x, y, z);
  lash.rotation.z = rotZ;
  return lash;
}
leftEyeGroup.add(createEyelash(0, 0.032, 0.025, 0));
rightEyeGroup.add(createEyelash(0, 0.032, 0.025, 0));

// Eyebrows
const browGeo = new THREE.BoxGeometry(0.06, 0.008, 0.005);
const leftBrow = new THREE.Mesh(browGeo, new THREE.MeshStandardMaterial({ color: '#5c3d2e', roughness: 0.5 }));
leftBrow.position.set(0.08, 0.075, 0.19);
leftBrow.rotation.z = -0.15;
headGroup.add(leftBrow);

const rightBrow = new THREE.Mesh(browGeo, new THREE.MeshStandardMaterial({ color: '#5c3d2e', roughness: 0.5 }));
rightBrow.position.set(-0.08, 0.075, 0.19);
rightBrow.rotation.z = 0.15;
headGroup.add(rightBrow);

// Nose
const noseGeo = new THREE.SphereGeometry(0.025, 8, 8);
const nose = new THREE.Mesh(noseGeo, skinMat);
nose.position.set(0, -0.01, 0.21);
nose.scale.set(1, 0.7, 0.6);
headGroup.add(nose);

// Mouth
const mouthGeo = new THREE.TorusGeometry(0.04, 0.012, 8, 12, Math.PI);
const mouth = new THREE.Mesh(mouthGeo, lipMat);
mouth.position.set(0, -0.055, 0.2);
mouth.rotation.z = Math.PI;
mouth.rotation.y = 0;
headGroup.add(mouth);

// Blush
const blushGeo = new THREE.SphereGeometry(0.05, 16, 16);
const leftBlush = new THREE.Mesh(blushGeo, blushMat);
leftBlush.position.set(0.15, -0.03, 0.14);
leftBlush.scale.set(0.5, 0.3, 0.3);
headGroup.add(leftBlush);

const rightBlush = new THREE.Mesh(blushGeo, blushMat);
rightBlush.position.set(-0.15, -0.03, 0.14);
rightBlush.scale.set(0.5, 0.3, 0.3);
headGroup.add(rightBlush);

// Ears
const earGeo = new THREE.SphereGeometry(0.04, 8, 8);
const leftEar = new THREE.Mesh(earGeo, skinMat);
leftEar.position.set(0.22, 0.02, 0);
leftEar.scale.set(0.4, 0.7, 0.7);
headGroup.add(leftEar);

const rightEar = new THREE.Mesh(earGeo, skinMat);
rightEar.position.set(-0.22, 0.02, 0);
rightEar.scale.set(0.4, 0.7, 0.7);
headGroup.add(rightEar);

// --- Hair ---
const hairGroup = new THREE.Group();
barbieGroup.add(hairGroup);

// Hair cap
const hairCapGeo = new THREE.SphereGeometry(0.26, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.55);
const hairCap = new THREE.Mesh(hairCapGeo, hairMat);
hairCap.position.y = 1.98;
hairCap.scale.set(1, 1.05, 0.88);
hairGroup.add(hairCap);

// Hair strands - back flowing hair
const strandGeo = new THREE.BoxGeometry(0.06, 0.45, 0.03);
for (let i = -4; i <= 4; i++) {
  const strand = new THREE.Mesh(strandGeo, hairMat);
  strand.position.set(i * 0.055, 1.65, -0.2);
  strand.rotation.x = -0.15;
  strand.scale.y = 1 - Math.abs(i) * 0.06;
  hairGroup.add(strand);
}

// Hair side strands (framing face)
const sideStrandGeo = new THREE.BoxGeometry(0.04, 0.35, 0.02);
const leftSideStrand = new THREE.Mesh(sideStrandGeo, hairMat);
leftSideStrand.position.set(0.16, 1.7, 0.08);
leftSideStrand.rotation.z = 0.3;
leftSideStrand.rotation.x = -0.1;
hairGroup.add(leftSideStrand);

const rightSideStrand = new THREE.Mesh(sideStrandGeo, hairMat);
rightSideStrand.position.set(-0.16, 1.7, 0.08);
rightSideStrand.rotation.z = -0.3;
rightSideStrand.rotation.x = -0.1;
hairGroup.add(rightSideStrand);

// Bangs
const bangsGeo = new THREE.BoxGeometry(0.24, 0.07, 0.04);
const bangsLeft = new THREE.Mesh(bangsGeo, hairMat);
bangsLeft.position.set(0.06, 2.16, 0.14);
bangsLeft.rotation.x = -0.35;
bangsLeft.rotation.z = 0.2;
hairGroup.add(bangsLeft);

const bangsRight = new THREE.Mesh(bangsGeo, hairMat);
bangsRight.position.set(-0.06, 2.16, 0.14);
bangsRight.rotation.x = -0.35;
bangsRight.rotation.z = -0.2;
hairGroup.add(bangsRight);

// Hair volume top
const hairTopGeo = new THREE.SphereGeometry(0.22, 16, 8, 0, Math.PI * 2, 0, Math.PI * 0.3);
const hairTop = new THREE.Mesh(hairTopGeo, hairMat);
hairTop.position.y = 2.18;
hairGroup.add(hairTop);

// --- Arms ---
function createArm(side) {

    c.userData.velocity.set(
      (Math.random() - 0.5) * 3,
      3 + Math.random() * 6,
      (Math.random() - 0.5) * 3
    );
    c.material.opacity = 1;
  });
}

// ─── ANIMATION ──────────────────────────────────────────
const clock = new THREE.Clock();
let celebrationTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  controls.update();

  // Sparkle animation
  const t = performance.now() * 0.001;
  sparkles.forEach(s => {
    if (!s.visible) return;
    s.userData.phase += s.userData.speed * dt;
    s.position.y = s.userData.baseY + Math.sin(s.userData.phase) * s.userData.amplitude;
    s.material.opacity = 0.3 + Math.abs(Math.sin(s.userData.phase * 2)) * 0.6;
  });

  // Confetti animation
  if (confettiGroup.visible) {
    celebrationTime += dt;
    confettiPieces.forEach(c => {
      if (!c.visible) return;
      c.userData.life += dt;
      if (c.userData.life > c.userData.maxLife) {
        c.visible = false;
        return;
      }
      const vel = c.userData.velocity;
      vel.y -= 3 * dt;
      c.position.x += vel.x * dt;
      c.position.y += vel.y * dt;
      c.position.z += vel.z * dt;
      c.rotation.x += c.userData.rotSpeed.x * dt;
      c.rotation.y += c.userData.rotSpeed.y * dt;
      c.rotation.z += c.userData.rotSpeed.z * dt;
      const progress = c.userData.life / c.userData.maxLife;
      if (progress > 0.7) {
        c.material.opacity = 1 - (progress - 0.7) / 0.3;
      }
    });

    if (celebrationTime > 3.5) {
      confettiGroup.visible = false;
      celebrationTime = 0;
      confettiPieces.forEach(c => { c.visible = false; });
    }
  }

  // Podium ring glow pulse
  ring.material.emissiveIntensity = 0.3 + Math.sin(t * 2) * 0.3;

  renderer.render(scene, camera);
}

animate();

  });

  // Update eyebrows for hair color

  rightBrow.material.color.set(state.hairColor === '#f5d5a0' ? '#5c3d2e' : state.hairColor);
}

function switchDressStyle(style) {
  state.dressStyle = style;
  Object.entries(dressMeshes).forEach(([key, mesh]) => {

}

function createSwatches(containerId, colorSet, stateKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  colorSet.forEach(color => {
    const swatch = document.createElement('div');
    swatch.className = 'swatch';
    swatch.style.backgroundColor = color;
    swatch.style.boxShadow = `0 0 8px ${color}44`;
    if (state[stateKey] === color) swatch.classList.add('active');
    swatch.addEventListener('click', () => {
      state[stateKey] = color;
      updateAllColors();
      document.querySelectorAll(`#${containerId} .swatch`).forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
    });
    container.appendChild(swatch);
  });
}

function createStyleButtons(containerId, styles) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  styles.forEach(style => {
    const btn = document.createElement('button');
    btn.className = 'style-btn';
    btn.textContent = `${style.icon} ${style.label}`;
    if (state.dressStyle === style.id) btn.classList.add('active');
    btn.addEventListener('click', () => {
      switchDressStyle(style.id);
      document.querySelectorAll(`#${containerId} .style-btn`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    container.appendChild(btn);
  });
}

function createAccessoryButtons(containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  accessoryDefs.forEach(acc => {
    const btn = document.createElement('button');
    btn.className = 'accessory-btn';
    if (state.accessories[acc.id]) btn.classList.add('on');
    btn.textContent = `${acc.icon} ${acc.label}`;
    btn.addEventListener('click', () => {
      state.accessories[acc.id] = !state.accessories[acc.id];
      if (state.accessories[acc.id]) {
        btn.classList.add('on');
      } else {
        btn.classList.remove('on');
      }
      updateAccessories();
    });
    container.appendChild(btn);
  });
}

function createSceneButtons(containerId) {
