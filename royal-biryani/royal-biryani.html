/* ─── 3D SCENE ─── */
class BiryaniScene {
  constructor(container) {
    this.container = container;
    this.mouseX = 0; this.mouseY = 0;
    this.targetMouseX = 0; this.targetMouseY = 0;
    this.isMobile = isMobileDevice();
    this.init();
  }
  init() {
    const { width, height } = this.container.getBoundingClientRect();
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(50, width/height, 0.1, 100);
    this.camera.position.set(0, 1.5, this.isMobile ? 10 : 8);
    this.camera.lookAt(0, 0, 0);
    this.renderer = new THREE.WebGLRenderer({ antialias: !this.isMobile, alpha: true, powerPreference: this.isMobile ? 'low-power' : 'high-performance' });
    this.renderer.setSize(width, height);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, this.isMobile ? 1.5 : 2));
    this.renderer.shadowMap.enabled = !this.isMobile;
    if (!this.isMobile) this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.2;
    this.container.appendChild(this.renderer.domElement);
    this.setupLights(); this.createBiryaniPot(); this.createParticles();
    this.createSteam(); this.createCloud(); this.setupEvents(); this.animate();
  }
  setupLights() {
    this.scene.add(new THREE.AmbientLight('#3a1a0a', 0.6));
    const key = new THREE.PointLight('#ff9a56', 12, 12, 1); key.position.set(3,4,4); key.castShadow = !this.isMobile; if (!this.isMobile) key.shadow.mapSize.set(512,512); this.scene.add(key);
    const fill = new THREE.PointLight('#ff6b35', 5, 8, 2); fill.position.set(-3,1,-2); this.scene.add(fill);
    const rim = new THREE.PointLight('#ffd4a8', 8, 10, 2); rim.position.set(0,3,-4); this.scene.add(rim);
    this.scene.add(new THREE.PointLight('#8B4513', 3, 5, 2).position.set(0,-2,0));
  }
  createBiryaniPot() {
    this.potGroup = new THREE.Group();
    const seg = this.isMobile ? 16 : 48, segLow = this.isMobile ? 8 : 32;
    const potM = new THREE.MeshStandardMaterial({ color:'#CD7F32', roughness:0.3, metalness:0.8 });
    const rimM = new THREE.MeshStandardMaterial({ color:'#DAA520', roughness:0.2, metalness:0.9 });
    const doughM = new THREE.MeshStandardMaterial({ color:'#DEB887', roughness:0.7, metalness:0.0 });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(1.2,0.9,2.4,seg,segLow), potM);
    body.castShadow = !this.isMobile; body.receiveShadow = !this.isMobile; body.position.y = -0.2; this.potGroup.add(body);
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.95,1.2,0.3,seg), rimM);
    neck.position.y = 1.15; this.potGroup.add(neck);
    const rimR = new THREE.Mesh(new THREE.TorusGeometry(0.95,0.08,8,segLow), rimM);
    rimR.position.y = 1.3; rimR.rotation.x = Math.PI/2; this.potGroup.add(rimR);
    const dough = new THREE.Mesh(new THREE.SphereGeometry(0.85,seg,segLow,0,Math.PI*2,0,Math.PI/2.5), doughM);
    dough.castShadow = !this.isMobile; dough.receiveShadow = !this.isMobile; dough.position.y = 1.3; this.potGroup.add(dough);
    const bumpCount = this.isMobile ? 8 : 16;
    for (let i=0; i<bumpCount; i++) {
      const a = (i/bumpCount)*Math.PI*2;
      const b = new THREE.Mesh(new THREE.SphereGeometry(0.06,4,4), doughM);
      b.position.set(Math.cos(a)*0.88, 1.35, Math.sin(a)*0.88); this.potGroup.add(b);
    }
    for (let s=-1; s<=1; s+=2) {
      const h = new THREE.Mesh(new THREE.TorusGeometry(0.3,0.06,8,8,Math.PI), rimM);
      h.rotation.z = Math.PI/2; h.rotation.y = s>0 ? Math.PI/2 : -Math.PI/2;
      h.position.set(s*1.25, 0.3, 0); this.potGroup.add(h);
    }
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.85,0.95,0.2,seg), rimM);
    base.position.y = -1.5; this.potGroup.add(base);
    const ringCount = this.isMobile ? 1 : 3;
    for (let i=0; i<ringCount; i++) {
      const r = new THREE.Mesh(new THREE.TorusGeometry(1.21,0.03,4,segLow), rimM);
      r.rotation.x = Math.PI/2; r.position.y = -0.7+i*0.6; this.potGroup.add(r);
    }
    this.scene.add(this.potGroup);
  }
  createParticles() {
    this.particlesGroup = new THREE.Group();
    const g = new THREE.SphereGeometry(0.03,4,4);
    const colors = ['#FF6B35','#FFD700','#FF4500','#FF8C00','#FF6347','#F4A261'];
    this.particles = [];
    for (let i=0; i<(this.isMobile?30:80); i++) {
      const m = new THREE.MeshStandardMaterial({ color:colors[Math.floor(Math.random()*colors.length)], roughness:0.2, metalness:0.5, emissive:colors[0], emissiveIntensity:0.4 });
      if (m.color) m.color.set(colors[Math.floor(Math.random()*colors.length)]);
      const p = new THREE.Mesh(g, m);
      const angle = Math.random()*Math.PI*2, radius = 1.4+Math.random()*2.5;
      p.position.set(Math.cos(angle)*radius, -1.5+Math.random()*4, Math.sin(angle)*radius);
      p.userData = { baseY:p.position.y, speed:0.5+Math.random()*2, amplitude:0.2+Math.random()*1, angle:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*2 };
      this.particlesGroup.add(p); this.particles.push(p);
    }
    this.scene.add(this.particlesGroup);
  }
  createSteam() {
    this.steamGroup = new THREE.Group(); this.steamParticles = [];
    for (let i=0; i<(this.isMobile?5:15); i++) {
      const s = new THREE.Mesh(new THREE.SphereGeometry(0.08+Math.random()*0.15,8,8), new THREE.MeshBasicMaterial({ color:'#ffffff', transparent:true, opacity:0.15 }));
      s.position.set((Math.random()-0.5)*0.8, 1.6+Math.random()*0.5, (Math.random()-0.5)*0.8);
      s.userData = { baseX:s.position.x, baseZ:s.position.z, speed:0.3+Math.random()*0.7, offset:Math.random()*Math.PI*2, life:Math.random() };
      this.steamGroup.add(s); this.steamParticles.push(s);
    }
    this.scene.add(this.steamGroup);
  }
  createCloud() {
    this.clouds = [];
    for (let i=0; i<(this.isMobile?2:5); i++) {
      const cg = new THREE.Group(), mat = new THREE.MeshBasicMaterial({ color:'#ffffff', transparent:true, opacity:0.06 });
      for (let j=0; j<6; j++) {
        const bl = new THREE.Mesh(new THREE.SphereGeometry(0.3+Math.random()*0.5,8,8), mat);
        bl.position.set((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.3, (Math.random()-0.5)*0.8);
        cg.add(bl);
      }
      cg.position.set((Math.random()-0.5)*6, 2+Math.random()*2, -4+Math.random()*2);
      cg.userData = { speed:0.1+Math.random()*0.3, offset:Math.random()*Math.PI*2 };
      this.scene.add(cg); this.clouds.push(cg);
    }
  }
  setupEvents() {
    this.onMouseMove = e => { const r = this.container.getBoundingClientRect(); this.targetMouseX = ((e.clientX-r.left)/r.width)*2-1; this.targetMouseY = -((e.clientY-r.top)/r.height)*2+1; };
    this.onResize = () => { const {width, height} = this.container.getBoundingClientRect(); this.camera.aspect = width/height; this.camera.updateProjectionMatrix(); this.renderer.setSize(width, height); };
    this.onTouchMove = e => { if (e.touches.length===1) { const r = this.container.getBoundingClientRect(); this.targetMouseX = ((e.touches[0].clientX-r.left)/r.width)*2-1; this.targetMouseY = -((e.touches[0].clientY-r.top)/r.height)*2+1; } };
    window.addEventListener('mousemove', this.onMouseMove);
    window.addEventListener('resize', this.onResize);
    window.addEventListener('touchmove', this.onTouchMove, {passive:true});
  }
  animate() {
    this.animFrame = requestAnimationFrame(() => this.animate());
    this.mouseX += (this.targetMouseX-this.mouseX)*0.05;
    this.mouseY += (this.targetMouseY-this.mouseY)*0.05;
    const t = performance.now()*0.001;
    if (this.potGroup) { this.potGroup.rotation.y += 0.003; this.potGroup.position.x += (this.mouseX*0.3-this.potGroup.position.x)*0.03; this.potGroup.position.y += (-0.3+this.mouseY*0.2-this.potGroup.position.y)*0.03; }
    this.camera.position.x += (this.mouseX*1.5-this.camera.position.x)*0.02;
    this.camera.position.y += (1.5+this.mouseY*0.5-this.camera.position.y)*0.02;
    this.camera.lookAt(0, 0.2, 0);
    if (this.particles) this.particles.forEach(p => { p.position.y = p.userData.baseY+Math.sin(t*p.userData.speed+p.userData.angle)*p.userData.amplitude; p.rotation.y += p.userData.rotSpeed*0.02; p.rotation.x += p.userData.rotSpeed*0.01; });
    if (this.steamParticles) this.steamParticles.forEach(s => { s.userData.life += s.userData.speed*0.005; if (s.userData.life>1) s.userData.life=0; const l=s.userData.life; s.position.y=1.6+l*2.5; s.position.x=s.userData.baseX+Math.sin(t*s.userData.speed*2+s.userData.offset)*0.3*l; s.position.z=s.userData.baseZ+Math.cos(t*s.userData.speed*1.5+s.userData.offset)*0.3*l; s.scale.setScalar(0.5+l*2); s.material.opacity=0.15*(1-l)*(1-l); });
    if (this.clouds) this.clouds.forEach(c => { c.position.x += Math.sin(t*c.userData.speed+c.userData.offset)*0.003; c.position.y += Math.cos(t*c.userData.speed*0.7)*0.002; });
    this.renderer.render(this.scene, this.camera);
  }
  dispose() {
    cancelAnimationFrame(this.animFrame);
    window.removeEventListener('mousemove', this.onMouseMove);
    window.removeEventListener('resize', this.onResize);
    window.removeEventListener('touchmove', this.onTouchMove);
    this.renderer.dispose();
    if (this.container.contains(this.renderer.domElement)) this.container.removeChild(this.renderer.domElement);
    this.scene.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) { if (Array.isArray(o.material)) o.material.forEach(m=>m.dispose()); else o.material.dispose(); } });
  }
}
