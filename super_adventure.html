<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Super Adventure - Kids Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: system-ui, sans-serif; overflow: hidden;
  }
  #game-wrapper {
    position: relative;
    max-width: 100vw; max-height: 100vh;
  }
  canvas { display: block; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
  #ui {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none; z-index: 10;
  }
  .ui-item {
    background: rgba(0,0,0,0.6); color: #fff; padding: 6px 14px;
    border-radius: 20px; font-size: 14px; font-weight: bold;
  }
  #mobile-controls {
    display: none; position: fixed; bottom: 16px; left: 0; right: 0;
    justify-content: space-between; padding: 0 16px; z-index: 20;
  }
  .ctrl-btn {
    width: 56px; height: 56px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.15); color: #fff; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; user-select: none; -webkit-user-select: none;
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.35); }
  #jump-btn {
    width: 72px; height: 72px; background: rgba(255,200,50,0.25);
    border-color: rgba(255,200,50,0.6); font-size: 18px;
  }
  @media (max-width: 768px) {
    #mobile-controls { display: flex; }
    .ui-item { font-size: 12px; padding: 4px 10px; }
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game"></canvas>
  <div id="ui">
    <span class="ui-item">⭐ <span id="score">0</span></span>
    <span class="ui-item">❤️ <span id="lives">3</span></span>
    <span class="ui-item" id="message"></span>
  </div>
  <div id="mobile-controls">
    <div>
      <button class="ctrl-btn" id="left-btn" ontouchstart="keys.left=true" ontouchend="keys.left=false" onmousedown="keys.left=true" onmouseup="keys.left=false">◀</button>
      <button class="ctrl-btn" id="right-btn" ontouchstart="keys.right=true" ontouchend="keys.right=false" onmousedown="keys.right=true" onmouseup="keys.right=false">▶</button>
    </div>
    <button class="ctrl-btn" id="jump-btn" ontouchstart="keys.space=true" ontouchend="keys.space=false" onmousedown="keys.space=true" onmouseup="keys.space=false">JUMP</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const TILE = 32;
const COLS = 80;
const ROWS = 20;
canvas.width = Math.min(window.innerWidth, 640);
canvas.height = Math.min(window.innerHeight, 420);
const W = canvas.width;
const H = canvas.height;

const keys = { left: false, right: false, space: false };
window.keys = keys;

document.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { keys.space = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.space = false;
});

const levelData = [
  '                                                                                ',
  '                                                                                ',
  '                                                                                ',
  '                                                                      F         ',
  '                                                          =====                ',
  '                                                       =                       ',
  '                                            C   C                               ',
  '                              C        =========                                ',
  '                       C   =======                                              ',
  '                C   ======                                                      ',
  '         C  =========                               C   C                       ',
  '       ====                                      =========   C    C             ',
  '    C=                                      C====                        C    C ',
  '  ===                          C      ======                       =============',
  '==                         =====  ====                         ====             ',
  '      E     E         E                       E       E                        ',
  '              =====                ====               ======                    ',
  '  ======               =======                                   ======         ',
  '               ======               =======                =====               ',
  'GGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGG',
];

const player = {
  x: 80, y: 0, w: 20, h: 28,
  vx: 0, vy: 0,
  onGround: false,
  dir: 1,
  frame: 0,
  invincible: 0
};

let cameraX = 0;
let score = 0;
let lives = 3;
let gameState = 'playing';
let coins = [];
let enemies = [];
let flag = null;
let platforms = [];
let particles = [];

function parseLevel() {
  coins = [];
  enemies = [];
  flag = null;
  platforms = [];
  for (let row = 0; row < levelData.length; row++) {
    for (let col = 0; col < levelData[row].length; col++) {
      const ch = levelData[row][col];
      const x = col * TILE;
      const y = row * TILE;
      if (ch === 'G' || ch === '=') {
        platforms.push({ x, y, w: TILE, h: TILE, type: ch === 'G' ? 'ground' : 'brick' });
      }
      if (ch === 'C') {
        coins.push({ x: x + TILE/2, y: y + TILE/2, collected: false, bob: Math.random() * Math.PI * 2 });
      }
      if (ch === 'E') {
        enemies.push({ x, y: y + 4, w: 24, h: 24, vx: -1.2, vy: 0, alive: true, frame: 0 });
      }
      if (ch === 'F') {
        flag = { x: x + TILE/2, y, w: 24, h: 80, reached: false };
      }
    }
  }
}

function resetLevel() {
  player.x = 80;
  player.y = 200;
  player.vx = 0;
  player.vy = 0;
  player.dir = 1;
  player.invincible = 0;
  cameraX = 0;
  gameState = 'playing';
  parseLevel();
  document.getElementById('message').textContent = '';
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 6 - 2,
      life: 30 + Math.random() * 20,
      color
    });
  }
}

function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  if (gameState !== 'playing') return;

  if (player.invincible > 0) player.invincible--;

  if (keys.left) player.vx = -4;
  else if (keys.right) player.vx = 4;
  else player.vx *= 0.7;

  if (keys.space && player.onGround) {
    player.vy = -9.5;
    player.onGround = false;
  }
  if (player.vx !== 0) player.dir = player.vx > 0 ? 1 : -1;

  player.vy += 0.55;
  if (player.vy > 12) player.vy = 12;

  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;

  for (const p of platforms) {
    if (rectCollide(player, p)) {
      const overlapX = Math.min(player.x + player.w - p.x, p.x + p.w - player.x);
      const overlapY = Math.min(player.y + player.h - p.y, p.y + p.h - player.y);

      if (overlapX < overlapY) {
        if (player.x + player.w/2 < p.x + p.w/2) player.x = p.x - player.w;
        else player.x = p.x + p.w;
        player.vx = 0;
      } else {
        if (player.y + player.h/2 < p.y + p.h/2) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        } else {
          player.y = p.y + p.h;
          player.vy = 0;
        }
      }
    }
  }

  if (player.y > H + 100) {
    lives--;
    if (lives <= 0) {
      gameState = 'gameover';
      document.getElementById('message').textContent = 'Game Over! Press R';
    } else {
      spawnParticles(player.x, player.y, '#ff4444', 12);
      player.x = 80;
      player.y = 200;
      player.vx = 0;
      player.vy = 0;
      player.invincible = 60;
    }
  }
  if (player.x < 0) player.x = 0;

  for (const coin of coins) {
    if (coin.collected) continue;
    coin.bob += 0.06;
    const cy = coin.y + Math.sin(coin.bob) * 3;
    const dist = Math.hypot(player.x + player.w/2 - coin.x, player.y + player.h/2 - cy);
    if (dist < 20) {
      coin.collected = true;
      score += 100;
      spawnParticles(coin.x, cy, '#ffdd00', 6);
    }
  }

  for (const enemy of enemies) {
    if (!enemy.alive) continue;
    enemy.x += enemy.vx;
    enemy.vy += 0.5;
    enemy.y += enemy.vy;

    enemy.onPlatform = false;
    for (const p of platforms) {
      if (rectCollide(enemy, p)) {
        const oY = Math.min(enemy.y + enemy.h - p.y, p.y + p.h - enemy.y);
        if (oY < 10 && enemy.vy >= 0) {
          enemy.y = p.y - enemy.h;
          enemy.vy = 0;
          enemy.onPlatform = true;
        }
      }
    }

    if (!enemy.onPlatform) {
      const groundBelow = platforms.find(p =>
        Math.abs(enemy.x - p.x) < TILE && p.y > enemy.y && p.y - enemy.y < 40
      );
      if (groundBelow) {
        enemy.y = groundBelow.y - enemy.h;
        enemy.vy = 0;
      } else if (enemy.y > H + 50) {
        enemy.alive = false;
        continue;
      }
    }

    for (const p of platforms) {
      if (p.x + p.w === enemy.x || enemy.x + enemy.w === p.x) {
        if (enemy.y + enemy.h > p.y && enemy.y < p.y + p.h) {
          enemy.vx *= -1;
        }
      }
    }

    enemy.frame += 0.1;
    enemy.x = Math.max(0, enemy.x);

    if (player.invincible <= 0 && rectCollide(player, enemy)) {
      if (player.vy > 0 && player.y + player.h - enemy.y < 16) {
        enemy.alive = false;
        player.vy = -6;
        score += 200;
        spawnParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, '#ff8844', 8);
      } else {
        lives--;
        if (lives <= 0) {
          gameState = 'gameover';
          document.getElementById('message').textContent = 'Game Over! Press R';
        } else {
          player.x = 80;
          player.y = 200;
          player.vx = 0;
          player.vy = 0;
          player.invincible = 60;
          spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 15);
        }
      }
    }
  }

  if (flag && !flag.reached && rectCollide(player, flag)) {
    flag.reached = true;
    score += 1000;
    spawnParticles(flag.x, flag.y, '#ffdd00', 20);
    gameState = 'win';
    document.getElementById('message').textContent = 'You Win! Press R to replay';
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  cameraX = player.x - W / 3;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > levelData[0].length * TILE - W) cameraX = levelData[0].length * TILE - W;
}

function drawClouds() {
  ctx.fillStyle = '#ffffff';
  const offsets = [50, 200, 400, 580, 750, 950, 1100, 1300, 1500, 1700];
  for (const ox of offsets) {
    const cx = ox - cameraX * 0.3;
    const cy = 30 + (ox % 70);
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, Math.PI * 2);
    ctx.arc(cx + 18, cy - 8, 18, 0, Math.PI * 2);
    ctx.arc(cx + 36, cy, 20, 0, Math.PI * 2);
    ctx.arc(cx + 14, cy + 6, 16, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  const px = player.x - cameraX;
  const py = player.y;

  ctx.fillStyle = '#e84118';
  ctx.beginPath();
  ctx.ellipse(px + player.w/2, py - 4, 8, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ff6b6b';
  ctx.fillRect(px + 2, py - 2, 16, 16);

  const bodyY = player.onGround ? Math.sin(Date.now() * 0.01 + player.x) * 1 : 0;
  ctx.fillStyle = '#cc0000';
  ctx.fillRect(px + 3, py + 10 + bodyY, 14, 10);

  ctx.fillStyle = '#2255cc';
  ctx.fillRect(px + 3, py + 18 + bodyY, 14, 6);

  ctx.fillStyle = '#8B4513';
  ctx.fillRect(px + 3, py + 24, 7, 4);
  ctx.fillRect(px + 10, py + 24, 7, 4);
}

function drawPlatform(p) {
  const x = p.x - cameraX;
  if (x < -TILE || x > W + TILE) return;
  if (p.type === 'ground') {
    ctx.fillStyle = '#5a3825';
    ctx.fillRect(x, p.y, p.w, p.h);
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(x, p.y, p.w, 5);
  } else {
    ctx.fillStyle = '#c4944c';
    ctx.fillRect(x, p.y, p.w, p.h);
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 1, p.y + 1, p.w - 2, p.h - 2);
    ctx.fillStyle = '#a06030';
    ctx.fillRect(x + 2, p.y + 2, 5, 5);
    ctx.fillRect(x + p.w - 7, p.y + 2, 5, 5);
    ctx.fillRect(x + 2, p.y + p.h - 7, 5, 5);
    ctx.fillRect(x + p.w - 7, p.y + p.h - 7, 5, 5);
  }
}

function drawCoin(c) {
  if (c.collected) return;
  const x = c.x - cameraX;
  const cy = c.y + Math.sin(c.bob) * 3;
  if (x < -20 || x > W + 20) return;
  const s = 6;
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(x, cy, s, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#FFA000';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#FFEC80';
  ctx.beginPath();
  ctx.arc(x - 2, cy - 2, 2.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemy(e) {
  if (!e.alive) return;
  const x = e.x - cameraX;
  if (x < -30 || x > W + 30) return;

  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.ellipse(x + e.w/2, e.y - 2, e.w/2, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#A0522D';
  ctx.beginPath();
  ctx.arc(x + e.w/2, e.y + 6, e.w/2 - 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + e.w/2 - 5, e.y - 1, 5, 0, Math.PI * 2);
  ctx.arc(x + e.w/2 + 5, e.y - 1, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#000';
  const eyeOff = Math.sin(e.frame) * 1;
  ctx.beginPath();
  ctx.arc(x + e.w/2 - 4 + eyeOff, e.y - 1, 2.5, 0, Math.PI * 2);
  ctx.arc(x + e.w/2 + 6 + eyeOff, e.y - 1, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#5a3825';
  ctx.fillRect(x + 3, e.y + e.h - 6, 4, 5);
  ctx.fillRect(x + e.w - 7, e.y + e.h - 6, 4, 5);
}

function drawFlag() {
  if (!flag || flag.reached) return;
  const x = flag.x - cameraX;
  ctx.fillStyle = '#888';
  ctx.fillRect(x - 2, flag.y, 3, flag.h);
  ctx.fillStyle = '#00cc00';
  ctx.beginPath();
  ctx.moveTo(x, flag.y);
  ctx.lineTo(x + 22, flag.y + 12);
  ctx.lineTo(x, flag.y + 24);
  ctx.fill();
  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.arc(x + 8, flag.y + 6, 5, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(p.x - cameraX - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;
}

function drawHills() {
  ctx.fillStyle = '#6ab04c';
  const hills = [{x: 0, s: 3}, {x: 250, s: 2.5}, {x: 600, s: 4}, {x: 900, s: 3.5}, {x: 1250, s: 3}, {x: 1600, s: 4}];
  for (const h of hills) {
    const hx = h.x - cameraX * 0.5;
    ctx.beginPath();
    ctx.arc(hx, H - 24, 60 * h.s, 0, Math.PI);
    ctx.fill();
  }
}

function render() {
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(0, 0, W, H);

  drawClouds();
  drawHills();

  for (const p of platforms) drawPlatform(p);
  for (const c of coins) drawCoin(c);
  for (const e of enemies) drawEnemy(e);
  drawFlag();
  drawParticles();
  drawPlayer();

  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', W/2, H/2 - 20);
    ctx.font = '16px system-ui';
    ctx.fillText('Press R to restart', W/2, H/2 + 20);
  }

  if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 28px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('You Win!', W/2, H/2 - 20);
    ctx.font = '16px system-ui';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Score: ${score}  ·  Press R to play again`, W/2, H/2 + 20);
  }

  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
}

document.addEventListener('keydown', e => {
  if (e.code === 'KeyR') {
    if (gameState === 'gameover' || gameState === 'win') {
      score = 0; lives = 3;
    }
    resetLevel();
  }
});

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth, 640);
  const maxH = Math.min(window.innerHeight, 420);
  canvas.width = maxW;
  canvas.height = maxH;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

parseLevel();
gameLoop();
</script>
</body>
</html>
