<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earthquake Globe – Past Week</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:system-ui,'Segoe UI',sans-serif; }
canvas { display:block; }

#loading-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.85); z-index:100; display:flex;
  flex-direction:column; align-items:center; justify-content:center; color:#fff;
}
#loading-overlay .spinner {
  width:48px; height:48px; border:3px solid #333; border-top-color:#3b82f6;
  border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loading-overlay .msg { font-size:14px; color:#aaa; margin-top:4px; }

#top-bar {
  position:fixed; top:0; left:0; right:0; z-index:10;
  background:linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
  padding:12px 16px 20px; display:flex; align-items:center; gap:12px;
  pointer-events:none;
}
#top-bar > * { pointer-events:auto; }
#count-badge {
  background:rgba(20,20,30,0.85); color:#ccc; padding:8px 14px;
  border-radius:20px; font-size:13px; border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(8px);
}
#count-badge b { color:#3b82f6; }

#filter-panel {
  display:flex; gap:8px; flex-wrap:wrap;
}
#filter-panel button {
  background:rgba(20,20,30,0.8); color:#aaa; border:1px solid rgba(255,255,255,0.1);
  padding:6px 14px; border-radius:16px; cursor:pointer; font-size:12px;
  transition:all 0.2s; backdrop-filter:blur(8px);
}
#filter-panel button:hover { color:#fff; border-color:rgba(255,255,255,0.3); }
#filter-panel button.active { background:#3b82f6; color:#fff; border-color:#3b82f6; }

#legend {
  position:fixed; bottom:24px; left:16px; z-index:10; font-size:12px;
  background:rgba(20,20,30,0.85); color:#ccc; padding:12px 16px;
  border-radius:10px; border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(8px); line-height:1.7;
}
#legend b { display:block; margin-bottom:4px; font-size:13px; }
#legend .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
#legend .note { font-size:10px; color:#777; margin-top:4px; }

#info-popup {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:20;
  background:rgba(20,20,30,0.92); color:#ddd; padding:14px 20px;
  border-radius:12px; border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(12px); font-size:13px; display:none; max-width:380px;
  text-align:center; line-height:1.6; box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
#info-popup .mag { font-size:32px; font-weight:700; color:#ff6b6b; }
#info-popup .place { font-size:15px; font-weight:600; margin:4px 0; }
#info-popup .detail { color:#999; font-size:12px; }
#info-popup a { color:#3b82f6; text-decoration:none; }
#info-popup .close-btn {
  position:absolute; top:8px; right:12px; color:#666; cursor:pointer;
  font-size:16px; line-height:1; border:none; background:none;
}
#info-popup .close-btn:hover { color:#fff; }

#tooltip {
  position:absolute; pointer-events:none; display:none; z-index:15;
  background:rgba(0,0,0,0.8); color:#fff; padding:4px 10px;
  border-radius:6px; font-size:12px; white-space:nowrap;
  transform:translate(-50%, -120%);
}

#controls-hint {
  position:fixed; bottom:16px; right:16px; color:#555; font-size:11px; z-index:10;
  text-align:right; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px;
}
#controls-hint kbd {
  background:rgba(255,255,255,0.1); border:1px solid #444;
  border-radius:3px; padding:1px 5px; font-size:10px; color:#aaa;
}

footer { position:fixed; bottom:4px; left:50%; transform:translateX(-50%); opacity:0.35;
  font-size:10px; color:#666; z-index:10; }
footer a { color:#3b82f6; text-decoration:none; }

.label-3d {
  color:#fff; font-size:11px; font-weight:600; text-shadow:0 0 6px rgba(0,0,0,0.9);
  pointer-events:none; white-space:nowrap; opacity:0.85;
  background:rgba(0,0,0,0.5); padding:1px 6px; border-radius:3px;
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div>Loading Earthquake Globe</div>
  <div class="msg" id="load-msg">Fetching data...</div>
</div>

<div id="top-bar">
  <div id="count-badge"></div>
  <div id="filter-panel">
    <button class="active" data-min="0">All magnitudes</button>
    <button data-min="2.5">M2.5+</button>
    <button data-min="4">M4+</button>
    <button data-min="5">M5+</button>
    <button data-min="6">M6+</button>
  </div>
</div>

<div id="legend">
  <b>Depth (km)</b>
  <span class="dot" style="background:#4caf50;"></span>&lt;30 shallow<br>
  <span class="dot" style="background:#ffeb3b;"></span>30–70<br>
  <span class="dot" style="background:#ff9800;"></span>70–150<br>
  <span class="dot" style="background:#f44336;"></span>&gt;150 deep<br>
  <span class="dot" style="background:rgba(100,180,255,0.6);"></span>Tectonic plates<br>
  <span style="display:block;margin-top:4px;">Size = magnitude &uarr;</span>
  <span class="note">Click a marker for details</span>
</div>

<div id="info-popup">
  <button class="close-btn" onclick="document.getElementById('info-popup').style.display='none'">&times;</button>
  <div class="mag" id="pop-mag"></div>
  <div class="place" id="pop-place"></div>
  <div class="detail" id="pop-detail"></div>
  <a id="pop-link" href="#" target="_blank">View on USGS &rarr;</a>
</div>

<div id="tooltip"></div>
<div id="controls-hint">
  <kbd>Drag</kbd> rotate &nbsp; <kbd>Scroll</kbd> zoom &nbsp; <kbd>Click</kbd> details
</div>

<footer><a href="https://nebulacloud.studio">Built with NebulaCloud Studio</a></footer>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const RADIUS = 5;
const SEGMENTS = 128;

// ── Scene setup ────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.5, 40);
camera.position.set(0, 3, 13.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000510);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'fixed';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 6;
controls.maxDistance = 22;
controls.rotateSpeed = 0.5;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.12;

// ── Lighting ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x2a3a55, 3.5));
const sun = new THREE.DirectionalLight(0xffffff, 5);
sun.position.set(10, 5, 8);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x446688, 2);
fill.position.set(-6, 0, -4);
scene.add(fill);

// ── Stars ──────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starVerts = new Float32Array(2500 * 3);
for (let i = 0; i < 2500; i++) {
  const th = Math.random() * Math.PI * 2;
  const ph = Math.acos(2 * Math.random() - 1);
  const r = 19 + Math.random() * 11;
  starVerts[i*3]   = r * Math.sin(ph) * Math.cos(th);
  starVerts[i*3+1] = r * Math.sin(ph) * Math.sin(th);
  starVerts[i*3+2] = r * Math.cos(ph);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
  color:0x8899bb, size:0.04, transparent:true, opacity:0.6
})));

// ── Globe ──────────────────────────────────────────────────────
const texLoader = new THREE.TextureLoader();
const earthTex = texLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
const bumpTex = texLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');

const globeGeo = new THREE.SphereGeometry(RADIUS, SEGMENTS, SEGMENTS);
const globeMat = new THREE.MeshPhongMaterial({
  map: earthTex, bumpMap: bumpTex, bumpScale: 0.04,
  specular: 0x111111, shininess: 5
});
const globe = new THREE.Mesh(globeGeo, globeMat);
scene.add(globe);

// Atmosphere glow
const glowGeo = new THREE.SphereGeometry(RADIUS + 0.1, 64, 64);
const glowMat = new THREE.ShaderMaterial({
  vertexShader: `varying vec3 vN; void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `varying vec3 vN; void main(){float i=pow(0.72-dot(vN,vec3(0,0,1)),2.8);gl_FragColor=vec4(0.25,0.45,0.9,1.0)*i;}`,
  side:THREE.BackSide, blending:THREE.AdditiveBlending, transparent:true, depthWrite:false,
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// ── Helpers ────────────────────────────────────────────────────
function latLonVec(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

function depthColor(km) {
  if (km < 30) return 0x4caf50;
  if (km < 70) return 0xffeb3b;
  if (km < 150) return 0xff9800;
  return 0xf44336;
}

// Subdivide great-circle arc for curved lines
function subdivideArc(a, b, segments = 32) {
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const dot = a.x*b.x + a.y*b.y + a.z*b.z;
    const angle = Math.acos(Math.min(1, dot));
    if (angle < 0.0001) { pts.push(a.clone()); continue; }
    const s = Math.sin(angle);
    const w0 = Math.sin((1-t)*angle) / s;
    const w1 = Math.sin(t*angle) / s;
    const pt = a.clone().multiplyScalar(w0).add(b.clone().multiplyScalar(w1));
    pt.normalize().multiplyScalar(RADIUS + 0.02);
    pts.push(pt);
  }
  return pts;
}

// ── Tectonic Plates ───────────────────────────────────────────
const plateGroup = new THREE.Group();
scene.add(plateGroup);

async function loadPlates() {
  try {
    const resp = await fetch('https://raw.githubusercontent.com/fraxen/tectonicplates/master/GeoJSON/PB2002_plates.json');
    const data = await resp.json();
    document.getElementById('load-msg').textContent = 'Drawing plate boundaries...';

    const plateMat = new THREE.LineBasicMaterial({
      color: 0x3a6ea5, transparent: true, opacity: 0.45, linewidth: 1,
    });

    for (const feat of data.features) {
      const geom = feat.geometry;
      if (!geom) continue;
      const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;

      for (const poly of polys) {
        const ring = poly[0];
        for (let i = 0; i < ring.length - 1; i++) {
          const [lon1, lat1] = ring[i];
          const [lon2, lat2] = ring[i + 1];
          const a = latLonVec(lat1, lon1, RADIUS);
          const b = latLonVec(lat2, lon2, RADIUS);
          if (a.distanceTo(b) > RADIUS * 0.5) continue;
          const arc = subdivideArc(a, b);
          const lineGeo = new THREE.BufferGeometry().setFromPoints(arc);
          plateGroup.add(new THREE.Line(lineGeo, plateMat));
        }
      }
    }
  } catch (e) {
    console.warn('Could not load plate data:', e.message);
  }
}

// ── Earthquake data ───────────────────────────────────────────
let quakeData = [];
const pointGroup = new THREE.Group();
const barGroup = new THREE.Group();
const labelGroup = new THREE.Group();
scene.add(pointGroup);
scene.add(barGroup);
scene.add(labelGroup);

let pointCloud = null;
let activeFilter = 0;

async function loadQuakes() {
  document.getElementById('load-msg').textContent = 'Fetching USGS earthquake data...';
  const resp = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_week.geojson');
  const data = await resp.json();
  quakeData = data.features;
  document.getElementById('load-msg').textContent = `Rendering ${quakeData.length} earthquakes...`;
  rebuildMarkers();
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('count-badge').innerHTML =
    `<b>${quakeData.length}</b> earthquakes &middot; Past 7 days`;
}

function rebuildMarkers() {
  pointGroup.clear();
  barGroup.clear();
  labelGroup.clear();

  const filtered = quakeData.filter(f => {
    const mag = f.properties.mag || 0;
    return mag >= activeFilter;
  });

  let maxMag = 0;
  for (const f of filtered) {
    const m = f.properties.mag || 0;
    if (m > maxMag) maxMag = m;
  }
  maxMag = Math.max(maxMag, 7);

  const positions = [];
  const colors = [];
  const sizes = [];

  for (const feat of filtered) {
    const geom = feat.geometry;
    if (!geom) continue;
    const [lon, lat, depth] = geom.coordinates;
    const mag = feat.properties.mag || 0;

    const pos = latLonVec(lat, lon, RADIUS);
    const height = (mag / maxMag) * 2.0 + 0.12;
    const dir = pos.clone().normalize();
    const mid = dir.clone().multiplyScalar(RADIUS + height * 0.5);

    positions.push(mid.x, mid.y, mid.z);
    const c = new THREE.Color(depthColor(depth));
    colors.push(c.r, c.g, c.b);
    sizes.push(Math.max(0.03, (mag / maxMag) * 0.22));

    // Bars for M3.5+
    if (mag >= 3.5) {
      const top = dir.clone().multiplyScalar(RADIUS + height);
      const barH = height;
      const barGeo = new THREE.CylinderGeometry(0.025, 0.025, barH, 6);
      const barMat = new THREE.MeshPhongMaterial({
        color: depthColor(depth), emissive: depthColor(depth),
        emissiveIntensity: 0.5, transparent: true, opacity: 0.7,
      });
      const bar = new THREE.Mesh(barGeo, barMat);
      bar.position.copy(dir.clone().multiplyScalar(RADIUS + barH * 0.5));
      bar.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
      bar.userData = { feat, index: filtered.indexOf(feat) };
      barGroup.add(bar);
    }

    // Labels for M5+
    if (mag >= 5) {
      const labelPos = dir.clone().multiplyScalar(RADIUS + height + 0.25);
      const labelEl = document.createElement('div');
      labelEl.className = 'label-3d';
      labelEl.textContent = `M${mag.toFixed(1)}`;
      labelEl.style.color = mag >= 7 ? '#ff4444' : mag >= 6 ? '#ff9944' : '#ffcc44';
      const label = new CSS2DObject(labelEl);
      label.position.copy(labelPos);
      label.userData = { feat, index: filtered.indexOf(feat) };
      labelGroup.add(label);
    }
  }

  // Points cloud
  if (positions.length > 0) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    const mat = new THREE.PointsMaterial({
      size: 0.22,
      map: createGlowTex(),
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.9,
      sizeAttenuation: true,
    });
    pointCloud = new THREE.Points(geo, mat);
    pointGroup.add(pointCloud);
  }

  document.getElementById('count-badge').innerHTML =
    activeFilter > 0
      ? `<b>${filtered.length}</b> / ${quakeData.length} earthquakes`
      : `<b>${quakeData.length}</b> earthquakes &middot; Past 7 days`;
}

function createGlowTex() {
  const c = document.createElement('canvas'); c.width=64; c.height=64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.15,'rgba(255,255,200,0.8)');
  g.addColorStop(0.4,'rgba(255,160,30,0.25)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

// ── Filter buttons ────────────────────────────────────────────
document.querySelectorAll('#filter-panel button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filter-panel button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = parseFloat(btn.dataset.min);
    rebuildMarkers();
  });
});

// ── Raycaster for click/hover ─────────────────────────────────
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.15;
const mouse = new THREE.Vector2();

const tooltip = document.getElementById('tooltip');
const popup = document.getElementById('info-popup');

function getIntersections(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const allTargets = [...barGroup.children, pointCloud].filter(Boolean);
  return raycaster.intersectObjects(allTargets, false);
}

renderer.domElement.addEventListener('mousemove', (event) => {
  const hits = getIntersections(event);
  if (hits.length > 0) {
    let feat = null;
    for (const hit of hits) {
      if (hit.object.userData && hit.object.userData.feat) {
        feat = hit.object.userData.feat;
        break;
      }
      if (hit.object === pointCloud && pointCloud) {
        const idx = hit.index;
        const filtered = quakeData.filter(f => (f.properties.mag||0) >= activeFilter);
        if (idx < filtered.length) feat = filtered[idx];
        break;
      }
    }
    if (feat) {
      const p = feat.properties;
      const mag = p.mag || 0;
      tooltip.style.display = 'block';
      tooltip.style.left = event.clientX + 'px';
      tooltip.style.top = event.clientY + 'px';
      tooltip.textContent = `M${mag.toFixed(1)} ${p.place || 'Unknown'}`;
      renderer.domElement.style.cursor = 'pointer';
    } else {
      tooltip.style.display = 'none';
      renderer.domElement.style.cursor = 'grab';
    }
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'grab';
  }
});

renderer.domElement.addEventListener('click', (event) => {
  if (event.target.tagName === 'BUTTON') return;
  const hits = getIntersections(event);
  if (hits.length > 0) {
    let feat = null;
    for (const hit of hits) {
      if (hit.object.userData && hit.object.userData.feat) {
        feat = hit.object.userData.feat;
        break;
      }
      if (hit.object === pointCloud && pointCloud) {
        const idx = hit.index;
        const filtered = quakeData.filter(f => (f.properties.mag||0) >= activeFilter);
        if (idx < filtered.length) feat = filtered[idx];
        break;
      }
    }
    if (feat) {
      const p = feat.properties;
      const g = feat.geometry;
      const depth = g ? g.coordinates[2] : 0;
      const mag = p.mag || 0;
      const time = new Date(p.time).toLocaleString();
      document.getElementById('pop-mag').textContent = `M ${mag.toFixed(1)}`;
      document.getElementById('pop-place').textContent = p.place || 'Unknown';
      document.getElementById('pop-detail').innerHTML =
        `Depth: ${depth.toFixed(1)} km<br>${time}`;
      document.getElementById('pop-link').href = p.url || '#';
      popup.style.display = 'block';
      controls.autoRotate = false;
    }
  } else {
    popup.style.display = 'none';
    controls.autoRotate = true;
  }
});

// ── Animate ────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  labelRenderer.render(scene, camera);
  renderer.render(scene, camera);
}

// ── Start ─────────────────────────────────────────────────────
await loadPlates();
await loadQuakes();
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
