<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drone Explorer Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f5f8;
  color: #222;
  height: 100vh;
  display: flex;
  overflow: hidden;
}
#sidebar {
  width: 300px;
  min-width: 280px;
  background: #ffffff;
  border-right: 1px solid #ddd;
  box-shadow: 2px 0 12px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  z-index: 10;
  transition: transform 0.3s ease;
}
#sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #222;
}
#sidebar-toggle {
  display: none;
  background: none;
  border: none;
  color: #666;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
}
#tree-container {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.tree-item {
  cursor: pointer;
  user-select: none;
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}
.tree-item:hover { background: #e8e8f0; }
.tree-item.selected {
  background: #dde8ff;
  border-left-color: #4da6ff;
}
.tree-item .toggle {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #999;
  flex-shrink: 0;
  transition: transform 0.2s;
}
.tree-item .toggle.expanded { transform: rotate(90deg); }
.tree-item .toggle.leaf { visibility: hidden; }
.tree-item .icon {
  width: 18px;
  height: 18px;
  font-size: 14px;
  text-align: center;
  flex-shrink: 0;
}
.tree-item .label {
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tree-children { overflow: hidden; transition: max-height 0.3s ease; }
.tree-children.collapsed { max-height: 0 !important; }
#info-panel {
  border-top: 1px solid #ddd;
  padding: 16px 20px;
  max-height: 250px;
  overflow-y: auto;
}
#info-panel h3 {
  font-size: 14px;
  color: #2266cc;
  margin-bottom: 8px;
}
#info-panel .info-row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 12px;
}
#info-panel .info-label { color: #999; }
#info-panel .info-value { color: #444; }
#info-panel .info-desc {
  font-size: 12px;
  color: #555;
  margin-top: 8px;
  line-height: 1.5;
}
#main-view {
  flex: 1;
  position: relative;
  background: #f0f0f5;
}
#canvas-container { width: 100%; height: 100%; }
#hint-bar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.85);
  color: #555;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 12px;
  pointer-events: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
#mobile-toggle {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 20;
  background: rgba(255,255,255,0.9);
  border: 1px solid #ccc;
  color: #444;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  display: none;
}
#loading {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  z-index: 5;
  transition: opacity 0.5s;
  color: #888;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #ddd;
  border-top-color: #4da6ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
    width: 280px;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-toggle { display: block; }
  #mobile-toggle { display: block; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>&#9992; Drone Explorer</h1>
    <button id="sidebar-toggle" title="Close">&#10005;</button>
  </div>
  <div id="tree-container"></div>
  <div id="info-panel">
    <h3 id="info-title">Select a component</h3>
    <div id="info-content">
      <div class="info-desc">Click on any drone component in the 3D view or tree to explore its details.</div>
    </div>
  </div>
</div>

<div id="main-view">
  <button id="mobile-toggle">&#9776; Components</button>
  <div id="canvas-container"></div>
  <div id="loading"><div class="spinner"></div><span>Loading drone model...</span></div>
  <div id="hint-bar">Drag to rotate &bull; Scroll to zoom &bull; Click to explore components</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';

const container = document.getElementById('canvas-container');
const loadingEl = document.getElementById('loading');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f5);
scene.fog = new THREE.Fog(0xf0f0f5, 5, 40);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.5, 100);
camera.position.set(5, 3.5, 8);
camera.lookAt(0, 0.2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.xr.enabled = true;
container.appendChild(renderer.domElement);

// VR button
const vrButton = VRButton.createButton(renderer);
vrButton.style.position = 'absolute';
vrButton.style.bottom = '60px';
vrButton.style.right = '20px';
vrButton.style.zIndex = '25';
document.getElementById('main-view').appendChild(vrButton);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI * 0.7;
controls.update();

// Lighting
const ambientLight = new THREE.AmbientLight(0x8899bb, 0.8);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0xddeeff, 0x8899aa, 0.6);
scene.add(hemiLight);

const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
keyLight.position.set(8, 12, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -10;
keyLight.shadow.camera.right = 10;
keyLight.shadow.camera.top = 10;
keyLight.shadow.camera.bottom = -10;
keyLight.shadow.bias = -0.0001;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x6688cc, 1.2);
fillLight.position.set(-3, 2, -4);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xaaccff, 1.5);
rimLight.position.set(0, 1, -6);
scene.add(rimLight);

const bottomLight = new THREE.DirectionalLight(0x334455, 0.8);
bottomLight.position.set(0, -3, 0);
scene.add(bottomLight);

// Ground grid
const gridHelper = new THREE.PolarGridHelper(6, 32, 24, 64, 0xccccdd, 0xddddee);
scene.add(gridHelper);

// Ground plane for shadows
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0xe8e8ee, roughness: 0.9, metalness: 0.05 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -3;
ground.receiveShadow = true;
scene.add(ground);

// ─── DRONE CONSTRUCTION ───
// Realistic PBR materials for solid rendering
const droneMaterials = {
  body: new THREE.MeshStandardMaterial({ color: 0x3a3a40, roughness: 0.25, metalness: 0.7 }),
  bodyAccent: new THREE.MeshStandardMaterial({ color: 0x2a2a30, roughness: 0.2, metalness: 0.75 }),
  arm: new THREE.MeshStandardMaterial({ color: 0x1a1a20, roughness: 0.4, metalness: 0.5 }),
  motor: new THREE.MeshStandardMaterial({ color: 0x5a5a62, roughness: 0.2, metalness: 0.85 }),
  motorTop: new THREE.MeshStandardMaterial({ color: 0x6a6a72, roughness: 0.15, metalness: 0.9 }),
  propeller: new THREE.MeshStandardMaterial({ color: 0x3a3a44, roughness: 0.35, metalness: 0.15, transparent: true, opacity: 0.88 }),
  camera: new THREE.MeshStandardMaterial({ color: 0x1a1a22, roughness: 0.3, metalness: 0.6 }),
  lens: new THREE.MeshStandardMaterial({ color: 0x0a0a14, roughness: 0.05, metalness: 0.15, emissive: 0x050510, emissiveIntensity: 0.3 }),
  landingGear: new THREE.MeshStandardMaterial({ color: 0x2e2e36, roughness: 0.35, metalness: 0.55 }),
  battery: new THREE.MeshStandardMaterial({ color: 0x2a3a28, roughness: 0.3, metalness: 0.3 }),
  gps: new THREE.MeshStandardMaterial({ color: 0x2a2e38, roughness: 0.2, metalness: 0.65 }),
  led: new THREE.MeshStandardMaterial({ color: 0x00ff44, roughness: 0.05, metalness: 0.05, emissive: 0x00ff44, emissiveIntensity: 2.5 }),
  ledRed: new THREE.MeshStandardMaterial({ color: 0xff2200, roughness: 0.05, metalness: 0.05, emissive: 0xff2200, emissiveIntensity: 2.5 }),
  antenna: new THREE.MeshStandardMaterial({ color: 0x4a4e58, roughness: 0.25, metalness: 0.6 }),
  screw: new THREE.MeshStandardMaterial({ color: 0x555560, roughness: 0.15, metalness: 0.9 }),
};

const droneRoot = new THREE.Group();
droneRoot.name = 'Drone';
scene.add(droneRoot);

// ── BODY (central hull) ──
const bodyGroup = new THREE.Group();
bodyGroup.name = 'Main Body';

const bodyGeo = new THREE.CapsuleGeometry(0.55, 0.6, 8, 16);
const body = new THREE.Mesh(bodyGeo, droneMaterials.body);
body.position.y = 0.15;
body.castShadow = true;
body.receiveShadow = true;
body.name = 'body';
bodyGroup.add(body);

const bodyTopGeo = new THREE.CylinderGeometry(0.45, 0.52, 0.25, 16);
const bodyTop = new THREE.Mesh(bodyTopGeo, droneMaterials.bodyAccent);
bodyTop.position.y = 0.55;
bodyTop.castShadow = true;
bodyGroup.add(bodyTop);

const bodyBottomGeo = new THREE.CylinderGeometry(0.45, 0.5, 0.2, 16);
const bodyBottom = new THREE.Mesh(bodyBottomGeo, droneMaterials.bodyAccent);
bodyBottom.position.y = -0.2;
bodyBottom.castShadow = true;
bodyGroup.add(bodyBottom);

const noseGeo = new THREE.SphereGeometry(0.32, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
const nose = new THREE.Mesh(noseGeo, droneMaterials.bodyAccent);
nose.position.set(0, 0.25, 0.52);
nose.rotation.x = -Math.PI / 2;
nose.castShadow = true;
bodyGroup.add(nose);

// Panel lines on body
function addPanelLine(x, y, z, rx, ry, rz, w, h) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshStandardMaterial({ color: 0x1a1a22, roughness: 0.4, metalness: 0.7, side: THREE.DoubleSide });
  const line = new THREE.Mesh(geo, mat);
  line.position.set(x, y, z);
  line.rotation.set(rx, ry, rz);
  bodyGroup.add(line);
}
addPanelLine(0, 0.35, 0.53, 0, 0, 0, 0.5, 0.02);
addPanelLine(0.53, 0.35, 0, 0, Math.PI/2, 0, 0.5, 0.02);
addPanelLine(-0.53, 0.35, 0, 0, Math.PI/2, 0, 0.5, 0.02);
addPanelLine(0, 0.35, -0.53, 0, 0, 0, 0.5, 0.02);

droneRoot.add(bodyGroup);

// ── ARMS ──
const armGroups = {};
const armData = [
  { name: 'Front-Right Arm', angle: Math.PI / 4, xDir: 1, zDir: 1 },
  { name: 'Front-Left Arm', angle: -Math.PI / 4, xDir: -1, zDir: 1 },
  { name: 'Rear-Right Arm', angle: Math.PI * 3 / 4, xDir: 1, zDir: -1 },
  { name: 'Rear-Left Arm', angle: -Math.PI * 3 / 4, xDir: -1, zDir: -1 },
];

armData.forEach(({ name, angle, xDir, zDir }) => {
  const armGroup = new THREE.Group();
  armGroup.name = name;

  // Arm - make it longer and position closer
  const armGeo = new THREE.CylinderGeometry(0.06, 0.08, 2.8, 8);
  const armMesh = new THREE.Mesh(armGeo, droneMaterials.arm);
  armMesh.rotation.z = Math.PI / 2;
  armMesh.position.x = 1.4 * xDir;
  armMesh.position.z = 1.4 * zDir;
  armMesh.position.y = 0.1;
  armMesh.castShadow = true;
  armMesh.receiveShadow = true;
  armMesh.name = name.toLowerCase().replace(/\s+/g, '-');
  armGroup.add(armMesh);

  // Arm connector to body (more prominent)
  const connGeo = new THREE.BoxGeometry(0.4, 0.25, 0.5);
  const conn = new THREE.Mesh(connGeo, droneMaterials.bodyAccent);
  conn.position.x = 0.45 * xDir;
  conn.position.z = 0.45 * zDir;
  conn.position.y = 0.1;
  armGroup.add(conn);

  // LED on arm tip
  const ledGeo = new THREE.SphereGeometry(0.04, 8, 8);
  const isFront = zDir > 0;
  const led = new THREE.Mesh(ledGeo, isFront ? droneMaterials.ledRed : droneMaterials.led);
  led.position.set(2.15 * xDir, 0.12, 2.15 * zDir);
  led.name = 'arm-led';
  armGroup.add(led);

  armGroups[name] = armGroup;
  droneRoot.add(armGroup);
});

// ── MOTORS ──
const motorGroups = {};
armData.forEach(({ name, xDir, zDir }) => {
  const motorGroup = new THREE.Group();
  const motorShortName = name.replace(' Arm', ' Motor');
  motorGroup.name = name.replace(' Arm', ' Motor');

  const motorBaseGeo = new THREE.CylinderGeometry(0.15, 0.17, 0.3, 16);
  const motorBase = new THREE.Mesh(motorBaseGeo, droneMaterials.motor);
  motorBase.position.set(2.2 * xDir, 0.22, 2.2 * zDir);
  motorBase.castShadow = true;
  motorBase.name = 'motor-base';
  motorGroup.add(motorBase);

  const motorTopGeo = new THREE.CylinderGeometry(0.18, 0.15, 0.1, 16);
  const motorTop = new THREE.Mesh(motorTopGeo, droneMaterials.motorTop);
  motorTop.position.set(2.2 * xDir, 0.42, 2.2 * zDir);
  motorTop.castShadow = true;
  motorGroup.add(motorTop);

  motorGroups[name.replace(' Arm', ' Motor')] = motorGroup;
  droneRoot.add(motorGroup);
});

// ── PROPELLERS ──
const propellerGroups = {};
const propellerBladeShape = new THREE.Shape();
propellerBladeShape.moveTo(0, -0.08);
propellerBladeShape.bezierCurveTo(0.15, -0.06, 0.6, -0.03, 0.8, 0);
propellerBladeShape.bezierCurveTo(0.6, 0.03, 0.15, 0.06, 0, 0.08);
propellerBladeShape.closePath();
const extrudeSettings = { steps: 1, depth: 0.015, bevelEnabled: true, bevelThickness: 0.005, bevelSize: 0.005, bevelSegments: 3 };
const bladeGeo = new THREE.ExtrudeGeometry(propellerBladeShape, extrudeSettings);
bladeGeo.center();
bladeGeo.rotateX(Math.PI / 2);

function makePropeller() {
  const propGroup = new THREE.Group();
  for (let i = 0; i < 2; i++) {
    const blade = new THREE.Mesh(bladeGeo, droneMaterials.propeller);
    blade.rotation.y = i * Math.PI;
    blade.castShadow = true;
    propGroup.add(blade);
  }
  // Hub
  const hubGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.06, 12);
  const hub = new THREE.Mesh(hubGeo, droneMaterials.motorTop);
  propGroup.add(hub);

  // Prop guard arc (thin ring)
  const ringGeo = new THREE.TorusGeometry(0.12, 0.015, 8, 16);
  const ring = new THREE.Mesh(ringGeo, droneMaterials.motor);
  ring.rotation.x = Math.PI / 2;
  propGroup.add(ring);

  return propGroup;
}

armData.forEach(({ name, xDir, zDir }) => {
  const propGroup = new THREE.Group();
  propGroup.name = name.replace(' Arm', ' Propeller');

  const prop = makePropeller();
  prop.position.set(2.2 * xDir, 0.52, 2.2 * zDir);
  prop.name = 'propeller-blades';
  propGroup.add(prop);

  propellerGroups[name.replace(' Arm', ' Propeller')] = propGroup;
  droneRoot.add(propGroup);
});

// ── LANDING GEAR ──
const landingGroup = new THREE.Group();
landingGroup.name = 'Landing Gear';

function makeSkid(xOffset) {
  const skidGroup = new THREE.Group();
  const legGeo = new THREE.CylinderGeometry(0.03, 0.04, 0.5, 8);
  const leg = new THREE.Mesh(legGeo, droneMaterials.landingGear);
  leg.position.set(xOffset, -0.55, 0);
  leg.castShadow = true;
  skidGroup.add(leg);

  const footGeo = new THREE.BoxGeometry(0.06, 0.06, 0.9);
  const foot = new THREE.Mesh(footGeo, droneMaterials.landingGear);
  foot.position.set(xOffset, -0.8, 0);
  foot.castShadow = true;
  foot.receiveShadow = true;
  skidGroup.add(foot);

  return skidGroup;
}
landingGroup.add(makeSkid(0.25));
landingGroup.add(makeSkid(-0.25));
droneRoot.add(landingGroup);

// ── CAMERA GIMBAL ──
const cameraGroup = new THREE.Group();
cameraGroup.name = 'Camera Gimbal';

const gimbalArmGeo = new THREE.CylinderGeometry(0.04, 0.05, 0.4, 8);
const gimbalArm = new THREE.Mesh(gimbalArmGeo, droneMaterials.camera);
gimbalArm.position.y = -0.55;
gimbalArm.castShadow = true;
cameraGroup.add(gimbalArm);

const gimbalHousingGeo = new THREE.BoxGeometry(0.25, 0.2, 0.2);
const gimbalHousing = new THREE.Mesh(gimbalHousingGeo, droneMaterials.camera);
gimbalHousing.position.y = -0.8;
gimbalHousing.castShadow = true;
cameraGroup.add(gimbalHousing);

const lensGeo = new THREE.CylinderGeometry(0.08, 0.09, 0.12, 16);
const lens = new THREE.Mesh(lensGeo, droneMaterials.lens);
lens.position.set(0, -0.8, 0.15);
lens.rotation.x = Math.PI / 2;
cameraGroup.add(lens);

droneRoot.add(cameraGroup);

// ── BATTERY ──
const batteryGroup = new THREE.Group();
batteryGroup.name = 'Battery';

const batteryGeo = new THREE.BoxGeometry(0.35, 0.2, 0.5);
const battery = new THREE.Mesh(batteryGeo, droneMaterials.battery);
battery.position.set(0, -0.15, -0.25);
battery.castShadow = true;
batteryGroup.add(battery);

// Battery indicator dots
for (let i = 0; i < 4; i++) {
  const dotGeo = new THREE.SphereGeometry(0.02, 6, 6);
  const dotColor = i < 3 ? 0x44cc44 : 0xcc4444;
  const dotMat = new THREE.MeshStandardMaterial({ color: dotColor, roughness: 0.1, emissive: dotColor, emissiveIntensity: 0.7 });
  const dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.set(-0.1 + i * 0.07, -0.24, -0.02);
  batteryGroup.add(dot);
}

droneRoot.add(batteryGroup);

// ── GPS MODULE ──
const gpsGroup = new THREE.Group();
gpsGroup.name = 'GPS Module';

const gpsBaseGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.08, 16);
const gpsBase = new THREE.Mesh(gpsBaseGeo, droneMaterials.gps);
gpsBase.position.y = 0.62;
gpsBase.castShadow = true;
gpsGroup.add(gpsBase);

const gpsTopGeo = new THREE.SphereGeometry(0.09, 16, 8);
const gpsTop = new THREE.Mesh(gpsTopGeo, droneMaterials.gps);
gpsTop.position.y = 0.7;
gpsTop.castShadow = true;
gpsGroup.add(gpsTop);

droneRoot.add(gpsGroup);

// ── ANTENNAS ──
const antennaGroup = new THREE.Group();
antennaGroup.name = 'Antennas';

function makeAntenna(x, z) {
  const antGroup = new THREE.Group();
  const stalkGeo = new THREE.CylinderGeometry(0.015, 0.02, 0.35, 8);
  const stalk = new THREE.Mesh(stalkGeo, droneMaterials.antenna);
  stalk.position.y = 0.3;
  antGroup.add(stalk);

  const tipGeo = new THREE.SphereGeometry(0.025, 8, 8);
  const tip = new THREE.Mesh(tipGeo, droneMaterials.antenna);
  tip.position.y = 0.5;
  antGroup.add(tip);

  antGroup.position.set(x, 0.55, z);
  antGroup.rotation.z = x > 0 ? 0.3 : -0.3;
  antGroup.rotation.x = z > 0 ? 0.2 : -0.2;
  return antGroup;
}

antennaGroup.add(makeAntenna(0.25, 0.35));
antennaGroup.add(makeAntenna(-0.25, 0.35));
droneRoot.add(antennaGroup);

// ── SCREWS / DETAILS ──
const detailsGroup = new THREE.Group();
detailsGroup.name = 'Hardware Details';
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const screwGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.03, 6);
  const screw = new THREE.Mesh(screwGeo, droneMaterials.screw);
  screw.position.set(Math.cos(angle) * 0.35, 0.5, Math.sin(angle) * 0.35);
  screw.rotation.x = Math.PI / 2;
  detailsGroup.add(screw);
}
droneRoot.add(detailsGroup);

// ─── COMPONENT REGISTRY ───
const componentMap = new Map();

function registerComponent(group, key, label, description, icon) {
  componentMap.set(group, { key, label, description, icon });
  group.traverse((child) => {
    child.userData = { componentKey: key };
  });
}

registerComponent(bodyGroup, 'body', 'Main Body', 'Central hull housing the flight controller, IMU, and main electronics. Constructed from lightweight magnesium alloy with weather-sealed compartments.', '\u{1F4E6}');
registerComponent(armGroups['Front-Right Arm'], 'arm-fr', 'Front-Right Arm', 'Carbon fiber reinforced arm with internal wiring for motor power and signal. Quick-release folding mechanism at the body joint.', '\u{2197}');

function buildTree(config, parentEl) {
  config.forEach(node => {
    const hasChildren = node.children && node.children.length > 0;
    const el = document.createElement('div');
    el.className = 'tree-item';
    el.dataset.key = node.key;

    const toggle = document.createElement('span');
    toggle.className = 'toggle' + (hasChildren ? '' : ' leaf');
    toggle.textContent = '\u25B6';

    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = node.icon || '\u25CF';

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = node.label;

    el.appendChild(toggle);
    el.appendChild(icon);
    el.appendChild(label);
    parentEl.appendChild(el);

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (hasChildren) {
        const childrenContainer = el.nextElementSibling;
        if (childrenContainer && childrenContainer.classList.contains('tree-children')) {
          const isCollapsed = childrenContainer.classList.contains('collapsed');
          if (isCollapsed) {
            childrenContainer.classList.remove('collapsed');
            childrenContainer.style.maxHeight = childrenContainer.scrollHeight + 'px';
            toggle.classList.add('expanded');
          } else {
            childrenContainer.classList.add('collapsed');
            childrenContainer.style.maxHeight = '0px';
            toggle.classList.remove('expanded');
          }
        }
      }
      selectComponent(node.key, el);
    });

    if (hasChildren) {
      const childrenContainer = document.createElement('div');
      childrenContainer.className = 'tree-children';
      childrenContainer.style.maxHeight = '2000px';
      el.nextElementSibling || parentEl.appendChild(childrenContainer);
      parentEl.insertBefore(childrenContainer, el.nextElementSibling);
      toggle.classList.add('expanded');
      buildTree(node.children, childrenContainer);
    }
  });
}

// ─── SELECTION LOGIC ───
let selectedKey = null;
let selectedGroup = null;
const originalPositions = new Map();
const highlightMaterial = new THREE.MeshStandardMaterial({
  color: 0xff6600, roughness: 0.2, metalness: 0.4,
  emissive: 0xff4400, emissiveIntensity: 0.6
});

function resetHighlights() {
  componentMap.forEach((info, group) => {
    group.traverse((child) => {
      if (child.isMesh && child.userData._origMaterial) {
        child.material = child.userData._origMaterial;
        child.userData._origMaterial = null;
      }
    });
    if (originalPositions.has(group)) {
      group.position.copy(originalPositions.get(group));
      originalPositions.delete(group);
    }
  });
  selectedGroup = null;
  selectedKey = null;
}

function selectComponent(key, treeEl) {
  // Deselect previous
  resetHighlights();
  document.querySelectorAll('.tree-item.selected').forEach(el => el.classList.remove('selected'));
  if (treeEl) treeEl.classList.add('selected');

  selectedKey = key;

  // Find the 3D group
  let targetGroup = null;
  componentMap.forEach((info, group) => {
    if (info.key === key) targetGroup = group;
  });

  if (targetGroup) {
    selectedGroup = targetGroup;
    // Highlight
    targetGroup.traverse((child) => {
      if (child.isMesh && child.material && !child.userData._origMaterial && child.material !== highlightMaterial) {
        child.userData._origMaterial = child.material;
        const newMat = child.material.clone();
        newMat.color.set(0xff6600);
        newMat.emissive = new THREE.Color(0xff4400);
        newMat.emissiveIntensity = 0.6;
        child.material = newMat;
      }
    });
  }

  updateInfoPanel(key);
}

function updateInfoPanel(key) {
  let info = null;
  componentMap.forEach((compInfo, group) => {
    if (compInfo.key === key) info = compInfo;
  });

  const title = document.getElementById('info-title');
  const content = document.getElementById('info-content');

  if (!info) {
    title.textContent = 'Select a component';
    content.innerHTML = '<div class="info-desc">Click on any drone component in the 3D view or tree to explore its details.</div>';
    return;
  }

  title.textContent = info.icon + ' ' + info.label;
  content.innerHTML = `
    <div class="info-row"><span class="info-label">Type</span><span class="info-value">${info.label}</span></div>
    <div class="info-row"><span class="info-label">ID</span><span class="info-value">${info.key}</span></div>
    <div class="info-desc">${info.description}</div>
  `;
}

// ─── RAYCASTER FOR 3D CLICKS ───
const raycaster = new THREE.Raycaster();
raycaster.far = 30;
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  droneRoot.traverse((child) => {
    if (child.isMesh) meshes.push(child);
  });
  const intersects = raycaster.intersectObjects(meshes, false);

  if (intersects.length > 0) {
    let obj = intersects[0].object;
    while (obj) {
      if (obj.userData && obj.userData.componentKey) {
        const key = obj.userData.componentKey;
        const treeEl = document.querySelector(`.tree-item[data-key="${key}"]`);
        selectComponent(key, treeEl);
        return;
      }
      obj = obj.parent;
    }
  }
});

// ─── ANIMATION LOOP ───
const clock = new THREE.Clock();
function animate() {
  const dt = Math.min(clock.getDelta(), 0.1);
  const t = performance.now() * 0.001;

  // Spin propellers
  propellerGroups['Front-Right Propeller'].children.forEach(c => {
    c.rotation.y += dt * 25;
  });
  propellerGroups['Front-Left Propeller'].children.forEach(c => {
    c.rotation.y -= dt * 25;
  });
  propellerGroups['Rear-Right Propeller'].children.forEach(c => {
    c.rotation.y -= dt * 25;
  });
  propellerGroups['Rear-Left Propeller'].children.forEach(c => {
    c.rotation.y += dt * 25;
  });

  // Gentle hover
  droneRoot.position.y = Math.sin(t * 1.5) * 0.15;

  // Camera gentle tilt for gimbal
  cameraGroup.rotation.z = Math.sin(t * 2) * 0.1;

  controls.update();
  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);
