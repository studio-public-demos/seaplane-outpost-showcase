<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Taj Mahal - 3D Model</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 20px; left: 20px;
    color: rgba(255,255,255,0.7); font-size: 13px;
    background: rgba(0,0,0,0.5); padding: 8px 14px;
    border-radius: 6px; pointer-events: none;
    z-index: 10;
  }
  #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: white; font-size: 18px; z-index: 100; }
  @media (max-width: 600px) {
    #info { font-size: 11px; padding: 6px 10px; bottom: 10px; left: 10px; }
  }
</style>
</head>
<body>
<div id="loading">Loading Taj Mahal...</div>
<div id="info">
  <strong>Taj Mahal</strong> — Illustrative 3D Approximation<br>
  Drag to orbit · Scroll to zoom · Right-drag to pan
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

document.getElementById('loading').style.display = 'none';

const scene = new THREE.Scene();

const skyColor = new THREE.Color(0x87CEEB);
const fogColor = new THREE.Color(0xc8dce8);
scene.background = skyColor;
scene.fog = new THREE.Fog(fogColor, 60, 200);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.5, 300);
camera.position.set(18, 14, 22);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 50;
controls.maxPolarAngle = Math.PI * 0.75;
controls.update();

const marbleMat = new THREE.MeshStandardMaterial({
  color: 0xfaf8f0, roughness: 0.25, metalness: 0.02
});
const marbleFloor = new THREE.MeshStandardMaterial({
  color: 0xf5f0e8, roughness: 0.35, metalness: 0.02
});
const waterMat = new THREE.MeshStandardMaterial({
  color: 0x4a90d9, roughness: 0.1, metalness: 0.6
});
const darkMat = new THREE.MeshStandardMaterial({
  color: 0x3d3025, roughness: 0.6, metalness: 0.05
});
const goldMat = new THREE.MeshStandardMaterial({
  color: 0xc9a84c, roughness: 0.3, metalness: 0.8
});
const waterDark = new THREE.MeshStandardMaterial({
  color: 0x2c5f8a, roughness: 0.1, metalness: 0.4
});
const greenMat = new THREE.MeshStandardMaterial({
  color: 0x4a7c3f, roughness: 0.8
});

function addShadow(mesh) {
  mesh.castShadow = true;
  mesh.receiveShadow = true;
}

function createOnionDome(radius, height, segments) {
  const points = [];
  const n = 40;
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const angle = t * Math.PI * 0.5;
    let r = radius * Math.sin(angle);
    const h = height * (1 - Math.cos(angle));
    if (t > 0.6) {
      const tipFactor = (t - 0.6) / 0.4;
      r *= (1 - tipFactor * 0.5);
    }
    points.push(new THREE.Vector2(r, h));
  }
  points.push(new THREE.Vector2(0.06, height + 0.3));
  points.push(new THREE.Vector2(0.03, height + 0.7));
  points.push(new THREE.Vector2(0.01, height + 1.0));
  points.push(new THREE.Vector2(0, height + 1.2));
  const geo = new THREE.LatheGeometry(points, segments);
  const mesh = new THREE.Mesh(geo, marbleMat);
  addShadow(mesh);
  return mesh;
}

function createSmallDome(radius, height) {
  const points = [];
  const n = 30;
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const angle = t * Math.PI * 0.5;
    const r = radius * Math.sin(angle);
    const h = height * (1 - Math.cos(angle));
    points.push(new THREE.Vector2(r, h));
  }
  points.push(new THREE.Vector2(0.03, height + 0.2));
  points.push(new THREE.Vector2(0, height + 0.4));
  const geo = new THREE.LatheGeometry(points, 24);
  const mesh = new THREE.Mesh(geo, marbleMat);
  addShadow(mesh);
  return mesh;
}

function createArch(w, h, depth) {
  const shape = new THREE.Shape();
  shape.moveTo(-w/2, 0);
  shape.lineTo(-w/2, h * 0.7);
  const cp1 = new THREE.Vector2(-w/2, h);
  const cp2 = new THREE.Vector2(w/2, h);
  const end = new THREE.Vector2(w/2, h * 0.7);
  shape.bezierCurveTo(cp1, cp2, end);
  shape.lineTo(w/2, 0);
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: false });
  return geo;
}

function createMinaret(baseRadius, height) {
  const group = new THREE.Group();
  const bodyGeo = new THREE.CylinderGeometry(baseRadius * 0.6, baseRadius, height, 24);
  const body = new THREE.Mesh(bodyGeo, marbleMat);
  body.position.y = height / 2;
  addShadow(body);
  group.add(body);

  const balconyGeo = new THREE.TorusGeometry(baseRadius * 0.75, baseRadius * 0.12, 8, 24);
  const balcony = new THREE.Mesh(balconyGeo, marbleMat);
  balcony.position.y = height * 0.75;
  balcony.rotation.x = Math.PI / 2;
  addShadow(balcony);
  group.add(balcony);

  const top = createSmallDome(baseRadius * 0.55, baseRadius * 1.5);
  top.position.y = height + 0.15;
  group.add(top);

  return group;
}

function buildGround() {
  const geo = new THREE.PlaneGeometry(80, 80);
  const mesh = new THREE.Mesh(geo, greenMat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = -0.2;
  mesh.receiveShadow = true;
  scene.add(mesh);

  const pathGeo = new THREE.PlaneGeometry(3, 25);
  const pathMat = new THREE.MeshStandardMaterial({ color: 0xd4c5a0, roughness: 0.6 });
  const path = new THREE.Mesh(pathGeo, pathMat);
  path.rotation.x = -Math.PI / 2;
  path.position.set(0, -0.18, -15);
  path.receiveShadow = true;
  scene.add(path);
}

function buildReflectingPool() {
  const poolBase = new THREE.BoxGeometry(8, 0.15, 16);
  const pool = new THREE.Mesh(poolBase, darkMat);
  pool.position.set(0, -0.55, -7);
  addShadow(pool);
  scene.add(pool);

  const water = new THREE.PlaneGeometry(7.5, 15.5);
  const waterMesh = new THREE.Mesh(water, waterDark);
  waterMesh.rotation.x = -Math.PI / 2;
  waterMesh.position.set(0, -0.47, -7);
  scene.add(waterMesh);
}

function buildPlatform() {
  const platformGroup = new THREE.Group();

  const mainPlatform = new THREE.BoxGeometry(12, 1.2, 12);
  const plat = new THREE.Mesh(mainPlatform, marbleFloor);
  plat.position.y = 0.6;
  addShadow(plat);
  platformGroup.add(plat);

  const topPlatform = new THREE.BoxGeometry(10, 0.8, 10);
  const topPlat = new THREE.Mesh(topPlatform, marbleFloor);
  topPlat.position.y = 1.6;
  addShadow(topPlat);
  platformGroup.add(topPlat);

  const buildingPlatform = new THREE.BoxGeometry(8, 0.5, 8);
  const buildPlat = new THREE.Mesh(buildingPlatform, marbleMat);
  buildPlat.position.y = 2.25;
  addShadow(buildPlat);
  platformGroup.add(buildPlat);

  platformGroup.position.set(0, 0, 0);
  scene.add(platformGroup);
  return platformGroup;
}

function buildMainBuilding() {
  const building = new THREE.Group();

  const baseGeo = new THREE.BoxGeometry(5.5, 2, 5.5);
  const base = new THREE.Mesh(baseGeo, marbleMat);
  base.position.y = 1;
  addShadow(base);
  building.add(base);

  const wallsGeo = new THREE.BoxGeometry(5.3, 0.6, 5.3);
  const walls = new THREE.Mesh(wallsGeo, marbleMat);
  walls.position.y = 2.3;
  addShadow(walls);
  building.add(walls);

  const sides = [
    { pos: [0, 1.6, 2.78], rot: 0 },
    { pos: [0, 1.6, -2.78], rot: Math.PI },
    { pos: [2.78, 1.6, 0], rot: Math.PI / 2 },
    { pos: [-2.78, 1.6, 0], rot: -Math.PI / 2 }
  ];

  sides.forEach(s => {
    const archGroup = new THREE.Group();

    const archFrame = new THREE.BoxGeometry(1.6, 2.8, 0.3);
    const frame = new THREE.Mesh(archFrame, marbleMat);
    frame.position.y = 1.4;
    addShadow(frame);
    archGroup.add(frame);

    const archGeo = createArch(1.2, 2.2, 0.35);
    const archDark = new THREE.Mesh(archGeo, darkMat);
    archDark.position.y = 0.3;
    archGroup.add(archDark);

    archGroup.position.set(s.pos[0], s.pos[1], s.pos[2]);
    archGroup.rotation.y = s.rot;
    building.add(archGroup);
  });

  const drumGeo = new THREE.CylinderGeometry(1.9, 1.9, 0.8, 32);
  const drum = new THREE.Mesh(drumGeo, marbleMat);
  drum.position.y = 2.9;
  addShadow(drum);
  building.add(drum);

  const mainDome = createOnionDome(1.85, 3.2, 48);
  mainDome.position.y = 3.3;
  building.add(mainDome);

  const finialGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const finialTop = new THREE.Mesh(finialGeo, goldMat);
  finialTop.position.y = 7.85;
  building.add(finialTop);

  const cornerDomes = [
    [-1.8, 2.6, -1.8], [1.8, 2.6, -1.8],
    [-1.8, 2.6, 1.8], [1.8, 2.6, 1.8]
  ];
  cornerDomes.forEach(([cx, cy, cz]) => {
    const pillarBase = new THREE.BoxGeometry(0.35, 0.6, 0.35);
    const pillar = new THREE.Mesh(pillarBase, marbleMat);
    pillar.position.set(cx, cy - 0.4, cz);
    addShadow(pillar);
    building.add(pillar);

    const dome = createSmallDome(0.32, 0.7);
    dome.position.set(cx, cy + 0.4, cz);
    building.add(dome);

    const finial = new THREE.SphereGeometry(0.025, 4, 4);
    const fMesh = new THREE.Mesh(finial, goldMat);
    fMesh.position.set(cx, cy + 0.9, cz);
    building.add(fMesh);
  });

  building.position.y = 2.5;
  scene.add(building);
  return building;
}

function buildMinarets() {
  const minaretPositions = [
    [-4.5, 0.4, -4.5], [4.5, 0.4, -4.5],
    [-4.5, 0.4, 4.5], [4.5, 0.4, 4.5]
  ];
  minaretPositions.forEach(([mx, my, mz]) => {
    const minaret = createMinaret(0.22, 4.5);
    minaret.position.set(mx, my, mz);
    scene.add(minaret);
  });
}

function buildSurroundings() {
  const sideBuildingGeo = new THREE.BoxGeometry(6, 1.5, 3);
  const sidePositions = [
    [-10, 0.75, 0], [10, 0.75, 0]
  ];
  sidePositions.forEach(([sx, sy, sz]) => {
    const side = new THREE.Mesh(sideBuildingGeo, marbleFloor);
    side.position.set(sx, sy, sz);
    addShadow(side);
    scene.add(side);
  });

  for (let i = -6; i <= 6; i += 2) {
    for (let j = -12; j <= -2; j += 2) {
      const treeTrunk = new THREE.CylinderGeometry(0.08, 0.12, 1.5, 6);
      const trunk = new THREE.Mesh(treeTrunk, darkMat);
      trunk.position.set(i + 0.3, 0.75, j);
      addShadow(trunk);
      scene.add(trunk);

      const leaves = new THREE.SphereGeometry(0.5, 8, 6);
      const leafMesh = new THREE.Mesh(leaves, greenMat);
      leafMesh.position.set(i + 0.3, 1.7, j);
      leafMesh.scale.set(1, 1.3, 1);
      addShadow(leafMesh);
      scene.add(leafMesh);
    }
  }
}

function buildLighting() {
  const ambient = new THREE.AmbientLight(0xffeedd, 1.8);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xfff8ee, 4.5);
  sun.position.set(25, 20, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 80;
  sun.shadow.camera.left = -25;
  sun.shadow.camera.right = 25;
  sun.shadow.camera.top = 25;
  sun.shadow.camera.bottom = -25;
  sun.shadow.bias = -0.0003;
  sun.shadow.normalBias = 0.02;
  scene.add(sun);

  const fillLight = new THREE.DirectionalLight(0xc8d8ff, 1.2);
  fillLight.position.set(-10, 8, -5);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0xffeedd, 1.0);
  rimLight.position.set(0, 5, 15);
  scene.add(rimLight);
}

buildGround();
buildReflectingPool();
buildPlatform();
buildMainBuilding();
buildMinarets();
buildSurroundings();
buildLighting();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
