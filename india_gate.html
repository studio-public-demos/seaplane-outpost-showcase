<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>India Gate - Traffic Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: #fff; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; z-index: 10; display: flex;
    align-items: center; gap: 16px; pointer-events: none;
  }
  #ui span { opacity: 0.85; }
  #ui strong { color: #ffcc44; }
  #info {
    position: fixed; top: 16px; left: 16px;
    color: rgba(255,255,255,0.75); font-size: 12px;
    background: rgba(0,0,0,0.5); padding: 8px 12px;
    border-radius: 6px; z-index: 10; pointer-events: none;
  }
  @media (max-width: 600px) {
    #ui { font-size: 11px; padding: 8px 14px; gap: 10px; bottom: 10px; }
    #info { font-size: 10px; top: 8px; left: 8px; }
  }
</style>
</head>
<body>
<div id="info">India Gate · Delhi — Illustrative Traffic Simulation<br>Drag to orbit · Scroll to zoom · Right-drag to pan</div>
<div id="ui">
  <span>Vehicles: <strong id="vc">0</strong></span>
  <span>Speed: <strong id="sp">~30 km/h</strong></span>
  <span>Time: <strong id="tm">12:00</strong></span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8e3);
scene.fog = new THREE.Fog(0x7ec8e3, 100, 300);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.5, 400);
camera.position.set(25, 18, 30);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 8;
controls.maxDistance = 80;
controls.maxPolarAngle = Math.PI * 0.7;
controls.minPolarAngle = 0.15;
controls.update();

const sandstoneMat = new THREE.MeshStandardMaterial({ color: 0xc4a46c, roughness: 0.55, metalness: 0.05 });
const sandstoneDark = new THREE.MeshStandardMaterial({ color: 0xa08050, roughness: 0.6, metalness: 0.05 });
const concreteMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.7 });
const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const roadLine = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, emissive: 0x111111 });
const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.9 });
const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0xccc5b8, roughness: 0.7 });
const flameMat = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.1, emissive: 0xff4400, emissiveIntensity: 2.5 });
const flameInner = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.1, emissive: 0xffaa00, emissiveIntensity: 3 });

function addShadows(m) { m.castShadow = true; m.receiveShadow = true; }

function createArchShape(w, h) {
  const shape = new THREE.Shape();
  shape.moveTo(-w/2, 0);
  shape.lineTo(-w/2, h * 0.75);
  shape.absarc(0, h * 0.75, w/2, Math.PI, 0, false);
  shape.lineTo(w/2, 0);
  shape.closePath();
  return shape;
}

function createDome(radius, height) {
  const pts = [];
  for (let i = 0; i <= 30; i++) {
    const t = i / 30;
    const a = t * Math.PI * 0.5;
    let r = radius * Math.sin(a);
    let h = height * (1 - Math.cos(a));
    if (t > 0.65) { r *= 1 - ((t - 0.65) / 0.35) * 0.4; }
    pts.push(new THREE.Vector2(r, h));
  }
  pts.push(new THREE.Vector2(0.02, height + 0.2));
  pts.push(new THREE.Vector2(0, height + 0.35));
  return new THREE.Mesh(new THREE.LatheGeometry(pts, 20), sandstoneMat);
}

function buildIndiaGate() {
  const monument = new THREE.Group();

  const basePlatform = new THREE.BoxGeometry(6, 0.5, 2.5);
  const base = new THREE.Mesh(basePlatform, sandstoneMat);
  base.position.y = 0.25;
  addShadows(base);
  monument.add(base);

  const midPlatform = new THREE.BoxGeometry(5.5, 0.4, 2.2);
  const mid = new THREE.Mesh(midPlatform, sandstoneMat);
  mid.position.y = 0.7;
  addShadows(mid);
  monument.add(mid);

  const mainBase = new THREE.BoxGeometry(5, 0.8, 1.8);
  const mainB = new THREE.Mesh(mainBase, sandstoneMat);
  mainB.position.y = 1.3;
  addShadows(mainB);
  monument.add(mainB);

  const leftPier = new THREE.BoxGeometry(1.2, 5, 1.6);
  const lp = new THREE.Mesh(leftPier, sandstoneMat);
  lp.position.set(-1.6, 4.2, 0);
  addShadows(lp);
  monument.add(lp);

  const rightPier = new THREE.BoxGeometry(1.2, 5, 1.6);
  const rp = new THREE.Mesh(rightPier, sandstoneMat);
  rp.position.set(1.6, 4.2, 0);
  addShadows(rp);
  monument.add(rp);

  const topBeam = new THREE.BoxGeometry(4.5, 0.6, 1.6);
  const tb = new THREE.Mesh(topBeam, sandstoneMat);
  tb.position.set(0, 7.0, 0);
  addShadows(tb);
  monument.add(tb);

  const cornice = new THREE.BoxGeometry(4.8, 0.25, 2.0);
  const corn = new THREE.Mesh(cornice, sandstoneDark);
  corn.position.y = 7.4;
  addShadows(corn);
  monument.add(corn);

  const topBlock = new THREE.BoxGeometry(4.5, 0.3, 1.8);
  const tB = new THREE.Mesh(topBlock, sandstoneMat);
  tB.position.y = 7.68;
  addShadows(tB);
  monument.add(tB);

  const archShape = createArchShape(2.0, 5.2);
  const archGeo = new THREE.ExtrudeGeometry(archShape, { depth: 1.8, bevelEnabled: false });
  const archInner = new THREE.Mesh(archGeo, sandstoneDark);
  archInner.position.set(0, 1.7, -0.9);
  archInner.castShadow = false;
  archInner.receiveShadow = true;
  monument.add(archInner);

  const domeCenter = createDome(0.8, 1.2);
  domeCenter.position.set(0, 8.1, 0);
  addShadows(domeCenter);
  monument.add(domeCenter);

  const domePositions = [[-1.8, 5.2, 0.65], [1.8, 5.2, 0.65], [-1.8, 5.2, -0.65], [1.8, 5.2, -0.65]];
  domePositions.forEach(([dx, dy, dz]) => {
    const sd = createDome(0.25, 0.4);
    sd.position.set(dx, dy, dz);
    addShadows(sd);
    monument.add(sd);
  });

  const inscriptionsLeft = new THREE.BoxGeometry(0.05, 3.5, 1.2);
  const insL = new THREE.Mesh(inscriptionsLeft, sandstoneDark);
  insL.position.set(-2.25, 3.5, 0);
  monument.add(insL);
  const inscriptionsRight = new THREE.BoxGeometry(0.05, 3.5, 1.2);
  const insR = new THREE.Mesh(inscriptionsRight, sandstoneDark);
  insR.position.set(2.25, 3.5, 0);
  monument.add(insR);

  const flameBase = new THREE.BoxGeometry(0.5, 0.2, 0.5);
  const fb = new THREE.Mesh(flameBase, concreteMat);
  fb.position.set(0, 1.7, 0);
  monument.add(fb);

  const flameGeo1 = new THREE.ConeGeometry(0.15, 0.5, 8, 4);
  const flame1 = new THREE.Mesh(flameGeo1, flameInner);
  flame1.position.set(0, 2.0, 0);
  monument.add(flame1);
  const flameGeo2 = new THREE.ConeGeometry(0.1, 0.4, 8, 4);
  const flame2 = new THREE.Mesh(flameGeo2, flameMat);
  flame2.position.set(0, 2.15, 0);
  flame2.scale.set(1, 1 + 0.15 * Math.sin(Date.now() * 0.01), 1);
  flame2.userData = { type: 'flame', baseY: 2.15 };
  monument.add(flame2);

  monument.castShadow = true;
  monument.receiveShadow = true;
  scene.add(monument);
  return { monument, flame2 };
}

function createRoadRing(radius, width) {
  const segments = 80;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    points.push(new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius));
  }
  const curve = new THREE.CatmullRomCurve3(points, true);
  const tubeGeo = new THREE.TubeGeometry(curve, 80, width, 8, true);
  const tube = new THREE.Mesh(tubeGeo, roadMat);
  tube.rotation.x = -Math.PI / 2;
  tube.position.y = 0.02;
  tube.receiveShadow = true;
  scene.add(tube);
  return curve;
}

function createStraightRoad(x1, z1, x2, z2, w) {
  const dx = x2 - x1;
  const dz = z2 - z1;
  const length = Math.sqrt(dx*dx + dz*dz);
  const angle = Math.atan2(dz, dx);
  const geo = new THREE.PlaneGeometry(length, w);
  const mesh = new THREE.Mesh(geo, roadMat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.rotation.z = -angle;
  mesh.position.set((x1+x2)/2, 0.015, (z1+z2)/2);
  mesh.receiveShadow = true;
  scene.add(mesh);

  for (let i = -0.5; i <= 0.5; i += 0.5) {
    if (i === 0) continue;
    const laneGeo = new THREE.PlaneGeometry(length * 0.6, 0.08);
    const laneMesh = new THREE.Mesh(laneGeo, roadLine);
    laneMesh.rotation.x = -Math.PI / 2;
    laneMesh.rotation.z = -angle;
    laneMesh.position.set((x1+x2)/2, 0.025, (z1+z2)/2 + i * w/4);
    laneMesh.receiveShadow = true;
    scene.add(laneMesh);
  }
  return { x1, z1, x2, z2, w, angle, length };
}

function createVehicle(type) {
  const group = new THREE.Group();
  group.userData = { type };

  let bodyGeo, bodyColor;
  const colors = {
    car: [0xdd3333, 0x3366cc, 0xeeeeee, 0x222222, 0xff8800, 0x44aa44, 0xcccc44, 0x8833aa],
    bus: [0x2255aa, 0xcc3333, 0xff8800],
    rickshaw: [0x33aa33, 0xdddd33, 0x444444],
    bike: [0x222222, 0xcc3333, 0x3366cc],
    truck: [0x886622, 0x556688, 0xcc6600]
  };
  const palette = colors[type] || colors.car;
  const color = palette[Math.floor(Math.random() * palette.length)];

  switch(type) {
    case 'car':
      bodyGeo = new THREE.BoxGeometry(0.42, 0.18, 0.85);
      group.userData.length = 0.9;
      group.userData.speed = 0.12 + Math.random() * 0.06;
      break;
    case 'bus':
      bodyGeo = new THREE.BoxGeometry(0.5, 0.4, 1.4);
      group.userData.length = 1.5;
      group.userData.speed = 0.07 + Math.random() * 0.04;
      break;
    case 'rickshaw':
      bodyGeo = new THREE.BoxGeometry(0.25, 0.18, 0.45);
      group.userData.length = 0.55;
      group.userData.speed = 0.08 + Math.random() * 0.04;
      break;
    case 'bike':
      bodyGeo = new THREE.BoxGeometry(0.1, 0.13, 0.35);
      group.userData.length = 0.4;
      group.userData.speed = 0.15 + Math.random() * 0.08;
      break;
    case 'truck':
      bodyGeo = new THREE.BoxGeometry(0.55, 0.45, 1.5);
      group.userData.length = 1.6;
      group.userData.speed = 0.06 + Math.random() * 0.03;
      break;
    default:
      bodyGeo = new THREE.BoxGeometry(0.4, 0.16, 0.8);
      group.userData.length = 0.85;
      group.userData.speed = 0.12;
  }

  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.5 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.15;
  addShadows(body);
  group.add(body);

  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
  const wheelGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.06, 8);
  const wheelPositions = type === 'bike' ? [[-0.06, 0.08, 0.12], [0.06, 0.08, 0.12], [0, 0.08, -0.12]] :
    [[-0.2, 0.08, 0.22], [0.2, 0.08, 0.22], [-0.2, 0.08, -0.22], [0.2, 0.08, -0.22]];

  wheelPositions.forEach(([wx, wy, wz]) => {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(wx, wy, wz);
    group.add(wheel);
  });

  return group;
}

function buildEnvironment() {
  const groundGeo = new THREE.PlaneGeometry(120, 120);
  const ground = new THREE.Mesh(groundGeo, grassMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.05;
  ground.receiveShadow = true;
  scene.add(ground);

  const centerGreen = new THREE.CylinderGeometry(4.8, 4.8, 0.03, 48);
  const cg = new THREE.Mesh(centerGreen, grassMat);
  cg.position.y = 0.02;
  cg.receiveShadow = true;
  scene.add(cg);

  for (let layer = 0; layer < 3; layer++) {
    const r = 15 + layer * 4;
    const count = 16 + layer * 8;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + layer * 0.3;
      const tr = r + (Math.random() - 0.5) * 3;
      const trunkH = 1.2 + Math.random() * 2;
      const trunkGeo = new THREE.CylinderGeometry(0.08, 0.14, trunkH, 6);
      const trunk = new THREE.Mesh(trunkGeo, new THREE.MeshStandardMaterial({ color: 0x6b4226, roughness: 0.8 }));
      trunk.position.set(Math.cos(angle) * tr, trunkH/2, Math.sin(angle) * tr);
      addShadows(trunk);
      scene.add(trunk);

      const leavesR = 0.6 + Math.random() * 0.8;
      const leavesGeo = new THREE.SphereGeometry(leavesR, 8, 6);
      const leaves = new THREE.Mesh(leavesGeo, new THREE.MeshStandardMaterial({ color: 0x337733 + Math.floor(Math.random() * 0x224411), roughness: 0.8 }));
      leaves.position.set(Math.cos(angle) * tr, trunkH + leavesR * 0.6, Math.sin(angle) * tr);
      leaves.scale.set(1, 1.2, 1);
      addShadows(leaves);
      scene.add(leaves);
    }
  }

  const roundaboutRoad = createRoadRing(6.5, 1.4);
  const outerRoad = createRoadRing(14, 0.6);

  const approachRoads = [
    createStraightRoad(7.2, 0, 30, 0, 1.2),
    createStraightRoad(-7.2, 0, -30, 0, 1.2),
    createStraightRoad(0, 7.2, 0, 30, 1.2),
    createStraightRoad(0, -7.2, 0, -30, 1.2),
    createStraightRoad(5.1, 5.1, 22, 22, 1.1),
    createStraightRoad(-5.1, -5.1, -22, -22, 1.1),
    createStraightRoad(5.1, -5.1, 22, -22, 1.1),
    createStraightRoad(-5.1, 5.1, -22, 22, 1.1),
  ];

  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 7.5 + Math.random() * 8;
    const lampH = 1.8 + Math.random() * 0.5;
    const poleGeo = new THREE.CylinderGeometry(0.04, 0.05, lampH, 6);
    const pole = new THREE.Mesh(poleGeo, new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.8 }));
    pole.position.set(Math.cos(angle) * dist, lampH/2, Math.sin(angle) * dist);
    addShadows(pole);
    scene.add(pole);

    const bulbGeo = new THREE.SphereGeometry(0.08, 8, 6);
    const bulb = new THREE.Mesh(bulbGeo, new THREE.MeshStandardMaterial({ color: 0xffffcc, roughness: 0.3, emissive: 0x332200, emissiveIntensity: 0.3 }));
    bulb.position.set(Math.cos(angle) * dist, lampH, Math.sin(angle) * dist);
    scene.add(bulb);
  }

  return { roundaboutRoad };
}

function buildLighting() {
  const ambient = new THREE.AmbientLight(0xffeedd, 1.6);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xfff5e8, 5);
  sun.position.set(30, 25, 15);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 120;
  sun.shadow.camera.left = -40;
  sun.shadow.camera.right = 40;
  sun.shadow.camera.top = 40;
  sun.shadow.camera.bottom = -40;
  sun.shadow.bias = -0.0002;
  sun.shadow.normalBias = 0.02;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0xb8c8e0, 1.0);
  fill.position.set(-15, 10, -10);
  scene.add(fill);
}

const { monument, flame2 } = buildIndiaGate();
const { roundaboutRoad } = buildEnvironment();
buildLighting();

const vehicles = [];
const MAX_VEHICLES = 50;
const vehicleTypes = ['car', 'car', 'car', 'car', 'car', 'bus', 'rickshaw', 'rickshaw', 'bike', 'bike', 'truck'];

function spawnVehicle() {
  if (vehicles.length >= MAX_VEHICLES) return;

  const type = vehicleTypes[Math.floor(Math.random() * vehicleTypes.length)];
  const veh = createVehicle(type);

  const approachIdx = Math.floor(Math.random() * 8);
  const angle = approachIdx * (Math.PI / 4);
  const startDist = 20 + Math.random() * 15;
  veh.userData.x = Math.cos(angle) * startDist;
  veh.userData.z = Math.sin(angle) * startDist;

  const toCenter = Math.atan2(-veh.userData.z, -veh.userData.x);
  veh.userData.direction = toCenter + (Math.random() - 0.5) * 0.3;
  veh.userData.state = 'approaching';
  veh.userData.lane = 0;
  veh.userData.roundaboutAngle = null;
  veh.userData.exitAngle = null;
  veh.userData.lifetime = 0;
  veh.userData.maxLife = 30 + Math.random() * 20;
  veh.userData.color = veh.children[0].material.color.getHex();

  veh.position.set(veh.userData.x, 0.1, veh.userData.z);
  veh.rotation.y = veh.userData.direction;
  scene.add(veh);
  vehicles.push(veh);
}

function distToCenter(v) {
  return Math.sqrt(v.userData.x * v.userData.x + v.userData.z * v.userData.z);
}

function updateVehicles(dt) {
  const centerX = 0, centerZ = 0;

  for (let i = vehicles.length - 1; i >= 0; i--) {
    const v = vehicles[i];
    v.userData.lifetime += dt;

    if (v.userData.lifetime > v.userData.maxLife) {
      const d = distToCenter(v);
      if (d > 25) {
        scene.remove(v);
        vehicles.splice(i, 1);
        continue;
      }
    }

    const d = distToCenter(v);
    const speed = v.userData.speed * dt * 8;

    if (v.userData.state === 'approaching' && d < 10) {
      v.userData.state = 'roundabout';
      v.userData.roundaboutAngle = Math.atan2(v.userData.z, v.userData.x);
    }

    if (v.userData.state === 'roundabout') {
      v.userData.roundaboutAngle += speed / 6.5;
      if (v.userData.roundaboutAngle > Math.PI * 2) v.userData.roundaboutAngle -= Math.PI * 2;

      v.userData.x = Math.cos(v.userData.roundaboutAngle) * 6.5;
      v.userData.z = Math.sin(v.userData.roundaboutAngle) * 6.5;
      v.userData.direction = v.userData.roundaboutAngle + Math.PI / 2;
      v.rotation.y = v.userData.direction;

      if (v.userData.lifetime > v.userData.maxLife * 0.4 && Math.random() < 0.005) {
        v.userData.state = 'exiting';
        const exitAngles = [0, Math.PI/4, Math.PI/2, 3*Math.PI/4, Math.PI, 5*Math.PI/4, 3*Math.PI/2, 7*Math.PI/4];
        v.userData.exitAngle = exitAngles[Math.floor(Math.random() * exitAngles.length)];
      }
    }

    if (v.userData.state === 'approaching') {
      v.userData.x += Math.cos(v.userData.direction) * speed;
      v.userData.z += Math.sin(v.userData.direction) * speed;
    }

    if (v.userData.state === 'exiting') {
      v.userData.x += Math.cos(v.userData.exitAngle) * speed * 0.8;
      v.userData.z += Math.sin(v.userData.exitAngle) * speed * 0.8;
      v.userData.direction = v.userData.exitAngle;
      v.rotation.y = v.userData.direction;

      if (distToCenter(v) > 25) {
        scene.remove(v);
        vehicles.splice(i, 1);
        continue;
      }
    }

    v.position.x = v.userData.x;
    v.position.z = v.userData.z;
    v.position.y = 0.1;
  }
}

const clock = new THREE.Clock();
let spawnTimer = 0;
const totalVehiclesEl = document.getElementById('vc');

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  spawnTimer += dt;
  if (spawnTimer > 0.4) {
    spawnTimer = 0;
    spawnVehicle();
  }

  updateVehicles(dt);
  totalVehiclesEl.textContent = vehicles.length;

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
